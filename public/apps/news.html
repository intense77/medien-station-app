<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>News Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            margin: 0;
            height: 100dvh;
        }
        
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker 15s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Optimierung für Smartphone Querformat */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3.5rem !important; margin-bottom: 0 !important; }
            .main-content { gap: 0.5rem !important; }
            #tv-frame { border-width: 4px !important; }
            .bauchbinde { bottom: 0.5rem !important; margin: 0 0.5rem !important; }
            .headline-text { font-size: 1.25rem !important; }
            .ticker-area { font-size: 0.75rem !important; padding: 0.25rem !important; }
        }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: fixed; left: 0; top: 0; width: 100%; height: 100%; display: flex !important; align-items: center; justify-content: center; background: white; z-index: 99999; }
            #print-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 box-border bg-slate-900 overflow-hidden" 
      onclick="window.resetIdleTimer()" ontouchstart="window.resetIdleTimer()">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <div class="hidden md:block absolute left-1/2 -translate-x-1/2 z-40 pointer-events-none">
            <h1 class="text-2xl lg:text-5xl font-black text-red-600 tracking-tighter uppercase italic drop-shadow-lg bg-white px-4 transform -skew-x-12 border-4 border-red-600">BREAKING NEWS</h1>
        </div>
        
        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="main-content flex-1 flex flex-col landscape:flex-row items-center justify-center w-full max-w-[95rem] mx-auto min-h-0 pb-1 gap-2 md:gap-4 px-1 md:px-2">
        
        <div class="w-full h-full flex-1 flex items-center justify-center min-h-0 min-w-0 relative">
            <div id="tv-frame" class="relative w-full h-auto max-w-full max-h-full aspect-video bg-black rounded-[1rem] md:rounded-[2.5rem] overflow-hidden border-4 md:border-[8px] border-slate-700 shadow-2xl shrink-0">
                
                <video id="video" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover"></video>
                
                <div class="absolute top-2 left-2 md:top-4 md:left-4 bg-red-600 text-white px-2 py-0.5 md:px-3 md:py-1 font-bold text-[8px] md:text-lg rounded-full shadow-md flex items-center gap-1 md:gap-2 animate-pulse z-10">
                    <div class="w-1.5 h-1.5 md:w-3 md:h-3 bg-white rounded-full"></div> LIVE
                </div>

                <div class="absolute top-2 right-2 md:top-4 md:right-4 bg-blue-700 text-white w-8 h-8 md:w-16 md:h-16 flex items-center justify-center font-black text-[10px] md:text-xl rounded-full border-2 md:border-4 border-white shadow-lg opacity-80 z-10">TV</div>

                <div class="bauchbinde absolute bottom-2 md:bottom-8 left-0 w-full z-20 px-2 md:px-8">
                    <div class="bg-blue-800/95 text-white p-1.5 md:p-4 border-l-4 md:border-l-[12px] border-yellow-400 shadow-lg">
                        <div class="text-[6px] md:text-xs font-bold text-yellow-400 uppercase tracking-widest mb-0.5">Top-Thema des Tages</div>
                        <div contenteditable="true" id="headline-input" class="headline-text text-sm md:text-4xl lg:text-5xl font-black uppercase leading-tight outline-none focus:bg-blue-900/50 min-h-[1.2em] cursor-text whitespace-nowrap overflow-hidden">HIER SCHLAGZEILE EINTIPPEN</div>
                    </div>
                    
                    <div class="ticker-area bg-yellow-400 text-black font-bold py-0.5 md:py-2 px-2 text-[8px] md:text-xl uppercase tracking-wide whitespace-nowrap overflow-hidden flex items-center mt-1 rounded-b-md md:rounded-b-lg">
                        <span class="bg-red-600 text-white px-1 mr-2 text-[6px] md:text-sm rounded flex-shrink-0">NEWS</span>
                        <div class="ticker-wrap flex-1">
                            <div class="ticker outline-none" contenteditable="true" id="ticker-input">+++ EILMELDUNG +++ Tickertext hier eingeben +++</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-controls" class="flex flex-row landscape:flex-col gap-2 md:gap-6 shrink-0 z-30 mb-1 md:mb-4 landscape:mb-0 landscape:mx-2 justify-center items-center">
            <button onclick="window.switchCamera()" class="w-12 h-12 md:w-20 md:h-20 bg-slate-700 hover:bg-slate-600 text-white font-black rounded-xl md:rounded-2xl text-lg md:text-3xl shadow-xl active:scale-95 transition border-b-4 md:border-b-[8px] border-slate-900 active:border-b-0 active:translate-y-1 flex items-center justify-center shrink-0" title="Kamera wechseln">🔄</button>
            <button onclick="window.takeSnapshot()" class="bg-red-600 hover:bg-red-500 text-white font-black py-2 px-6 md:py-4 md:px-12 rounded-xl md:rounded-2xl text-sm md:text-2xl shadow-xl active:scale-95 transition border-b-4 md:border-b-[8px] border-red-800 active:border-b-0 active:translate-y-1 flex items-center justify-center gap-2 md:gap-3 shrink-0">📸 FOTO</button>
        </div>
    </div>

    <div id="preview-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-2">
        <h2 class="text-lg md:text-4xl font-black text-white mb-2 md:mb-6">Deine Nachricht!</h2>
        <div class="relative w-full max-w-[95%] md:max-w-[80%] h-[60%] md:h-[70%] border-2 md:border-8 border-white shadow-2xl rounded-xl overflow-hidden bg-black flex shrink-0">
            <img id="preview-img-display" class="w-full h-full object-contain" src="">
        </div>
        <div class="flex gap-2 md:gap-6 mt-4 w-full max-w-3xl">
            <button onclick="window.closePreview()" class="flex-1 bg-yellow-500 text-black font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-yellow-700 active:translate-y-1 active:border-b-0">🔄 NOCHMAL</button>
            <button onclick="window.saveFromPreview()" class="flex-1 bg-red-600 text-white font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-red-800 active:translate-y-1 active:border-b-0">💾 SPEICHERN</button>
            <button onclick="window.printFromPreview(this)" class="flex-1 bg-white text-black font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-gray-400 active:translate-y-1 active:border-b-0">🖨️ DRUCKEN</button>
        </div>
    </div>

    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-blue-600 rounded-[2rem] max-w-3xl w-full p-6 md:p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo()" class="absolute top-6 right-6 text-white text-4xl font-bold">✖</button>
            <h2 class="text-2xl md:text-4xl font-black text-white mb-4 flex items-center gap-4">📰 ANLEITUNG</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm md:text-base text-slate-300">
                <p>✍️ <b>Schlagzeile:</b> Tippe auf den Text im Bild, um ihn zu ändern.</p>
                <p>🏃 <b>Laufschrift:</b> Tippe auf den gelben Balken für einen eigenen Ticker.</p>
            </div>
            <button onclick="window.toggleInfo()" class="mt-6 w-full bg-blue-600 text-white font-black py-3 rounded-xl text-lg">ALLES KLAR!</button>
        </div>
    </div>

    <div id="print-container" class="hidden"><img id="print-img" src=""></div>

    <script>
        // Logik bleibt weitestgehend identisch zur Vorlage, 
        // Fokus lag auf CSS-Klassen und Responsive-Handling.
        const video = document.getElementById('video');
        let currentStream;
        let currentFacingMode = 'user';

        async function initCam() {
            try {
                if (currentStream) currentStream.getTracks().forEach(track => track.stop());
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: {ideal: 1280}, height: {ideal: 720}, facingMode: currentFacingMode } 
                });
                currentStream = stream; 
                video.srcObject = stream;
                if (currentFacingMode === 'user') video.style.transform = 'scaleX(-1)';
                else video.style.transform = 'scaleX(1)';
            } catch (err) { console.error("Kamera-Fehler: ", err); }
        }
        
        window.switchCamera = function() {
            if(window.playSound) window.playSound('click');
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            initCam();
        }

        window.takeSnapshot = function() {
            if(window.playSound) window.playSound('shutter');
            const dataUrl = generateImage();
            document.getElementById('preview-img-display').src = dataUrl;
            document.getElementById('preview-overlay').classList.remove('hidden');
            document.getElementById('preview-overlay').style.display = 'flex';
        }

        window.closePreview = function() {
            if(window.playSound) window.playSound('click');
            document.getElementById('preview-overlay').classList.add('hidden');
            document.getElementById('preview-overlay').style.display = 'none';
        }

        // ... (Restliche Hilfsfunktionen wie generateImage, save, print etc. von deiner Vorlage übernehmen) ...
        // Hier folgt die generateImage Funktion wie in deinem Original...
        
        function generateImage() {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const w = 1280; const h = 720; canvas.width = w; canvas.height = h;
            const vRatio = video.videoWidth / video.videoHeight; const cRatio = w / h;
            let sx, sy, sWidth, sHeight;
            if (vRatio > cRatio) { sHeight = video.videoHeight; sWidth = sHeight * cRatio; sx = (video.videoWidth - sWidth) / 2; sy = 0; } 
            else { sWidth = video.videoWidth; sHeight = sWidth / cRatio; sx = 0; sy = (video.videoHeight - sHeight) / 2; }
            
            ctx.save();
            if(currentFacingMode === 'user') { ctx.scale(-1, 1); ctx.drawImage(video, sx, sy, sWidth, sHeight, -w, 0, w, h); }
            else { ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, w, h); }
            ctx.restore();

            // Overlay Zeichen-Logik (wie in deiner Vorlage)
            ctx.fillStyle = '#dc2626'; ctx.fillRect(30, 30, 100, 40);
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('LIVE', 60, 58);
            
            const headline = document.getElementById('headline-input').innerText.toUpperCase();
            const ticker = document.getElementById('ticker-input').innerText;
            
            ctx.fillStyle = 'rgba(30, 64, 175, 0.95)'; ctx.fillRect(50, h-190, w-100, 100);
            ctx.fillStyle = 'white'; ctx.font = '900 50px sans-serif'; ctx.fillText(headline, 85, h-110, w-170);
            
            ctx.fillStyle = '#facc15'; ctx.fillRect(50, h-90, w-100, 50);
            ctx.fillStyle = 'black'; ctx.font = 'bold 28px monospace'; ctx.fillText(ticker, 160, h-55, w-260);

            return canvas.toDataURL('image/png');
        }

        window.toggleInfo = function() { if(window.playSound) window.playSound('click'); document.getElementById('info-modal').classList.toggle('hidden'); }
        window.goHome = function() { window.location.href = '../index.html'; }
        
        initCam();
    </script>
</body>
</html>
