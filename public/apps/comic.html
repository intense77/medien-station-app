<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Comic Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>

    <style>
        body { 
            background-color: #facc15; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .font-comic { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
        
        /* SPRECHBLASEN */
        .bubble-container {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            left: 50%;
            bottom: 10%;
            transform: translateX(-50%);
        }
        
        .bubble-handle {
            background-color: #3b82f6;
            color: white;
            border-radius: 50%;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: move; border: 2px solid white;
            margin-bottom: -8px; z-index: 30;
            touch-action: none;
        }
        
        .bubble-text {
            background: white;
            border: 2px solid black;
            border-radius: 1rem;
            padding: 0.4rem 0.8rem;
            min-width: 100px;
            max-width: 180px;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            outline: none;
        }

        /* SMARTPHONE LANDSCAPE OPTIMIERUNG */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3.5rem !important; margin-bottom: 0.25rem !important; }
            .comic-title { display: none; }
            .cam-preview-box { width: 5rem !important; height: 3rem !important; }
            .panel-box { border-width: 4px !important; box-shadow: 4px 4px 0px black !important; }
            .bubble-text { font-size: 0.75rem !important; padding: 0.2rem 0.5rem !important; }
            .bubble-handle { width: 24px !important; height: 24px !important; }
            .snap-btn { width: 3.5rem !important; height: 3.5rem !important; font-size: 1.5rem !important; }
        }

        @media (min-width: 768px) {
            .bubble-text { border-width: 4px; font-size: 1.5rem; max-width: 280px; padding: 1rem; }
            .bubble-handle { width: 44px; height: 44px; font-size: 1.5rem; }
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="comic-title absolute left-1/2 -translate-x-1/2 text-2xl lg:text-4xl font-black font-comic transform -rotate-2 tracking-widest drop-shadow-md pointer-events-none">
            COMIC STUDIO
        </h1>

        <div class="flex items-center gap-2 md:gap-4 z-50">
            <button onclick="window.switchCamera()" class="bg-white text-black w-10 h-10 md:w-14 md:h-14 rounded-full text-lg md:text-2xl border-2 md:border-4 border-black shadow-md active:scale-90 flex items-center justify-center">🔄</button>

            <div class="cam-preview-box relative w-16 h-10 md:w-28 md:h-16 bg-black rounded-lg border-2 md:border-4 border-black shadow-lg overflow-hidden shrink-0 transform rotate-1">
                <video id="webcam" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-90"></video>
            </div>

            <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 shadow-xl text-lg md:text-2xl">?</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col landscape:flex-row gap-2 md:gap-4 w-full max-w-[95rem] mx-auto mb-2 overflow-hidden">
        
        <script>
            const placeholders = ["Start...", "Dann...", "Ende!"];
            for(let i=0; i<3; i++) {
                document.write(`
                <div class="panel-box flex-1 bg-white border-4 md:border-[8px] border-black relative shadow-[6px_6px_0px_black] md:shadow-[10px_10px_0px_black] rounded-xl overflow-hidden min-h-0" id="panel-${i}">
                    <canvas class="absolute inset-0 w-full h-full object-cover pointer-events-none bg-slate-100"></canvas>
                    <div class="absolute top-0 left-0 bg-black text-white px-3 md:px-5 py-0.5 md:py-1 text-xl md:text-4xl font-black font-comic z-10">${i+1}</div>
                    
                    <div class="bubble-container" id="container-${i}">
                        <div class="bubble-handle">✥</div>
                        <div contenteditable="true" class="bubble-text" 
                             onfocus="window.clearText(this, '${placeholders[i]}')" 
                             onblur="window.resetText(this, '${placeholders[i]}')">${placeholders[i]}</div>
                    </div>
                    
                    <button onclick="window.snap(${i})" class="snap-btn absolute bottom-2 right-2 w-12 h-12 md:w-20 md:h-20 bg-blue-600 text-white rounded-full text-xl md:text-4xl shadow-xl border-2 md:border-4 border-white z-30 active:scale-90 transition flex items-center justify-center">📸</button>
                </div>
                `);
            }
        </script>

    </div>

    <div class="flex justify-center gap-3 md:gap-6 px-2 mb-2 shrink-0">
        <button onclick="window.downloadComic()" class="flex-1 max-w-sm bg-slate-900 text-white font-black font-comic py-3 md:py-5 rounded-xl md:rounded-3xl border-b-4 md:border-b-8 border-slate-700 active:border-b-0 active:translate-y-1 transition-all shadow-xl flex items-center justify-center gap-2">
            <span class="text-xl md:text-3xl">💾</span> <span class="text-sm md:text-2xl">SPEICHERN</span>
        </button>
        <button onclick="window.printComic(this)" class="flex-1 max-w-sm bg-white text-black font-black font-comic py-3 md:py-5 rounded-xl md:rounded-3xl border-b-4 md:border-b-8 border-gray-300 active:border-b-0 active:translate-y-1 transition-all shadow-xl flex items-center justify-center gap-2">
            <span class="text-xl md:text-3xl">🖨️</span> <span class="text-sm md:text-2xl">DRUCKEN</span>
        </button>
    </div>

    <div id="print-container" class="hidden"><img id="print-img" src=""></div>

    <script>
        // Logik bleibt wie in deinem Original, nur Initialisierung und Drag-Fixes
        const video = document.getElementById('webcam');
        let currentFacingMode = 'user';
        let currentStream;

        window.initCam = async function() {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: currentFacingMode }
                });
                video.srcObject = currentStream;
            } catch (err) { console.error(err); }
        }

        window.snap = function(index) {
            if(window.playSound) window.playSound('shutter');
            const panel = document.getElementById('panel-' + index);
            const canvas = panel.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1280; canvas.height = 720;

            ctx.save();
            if(currentFacingMode === 'user') {
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, 1280, 720, -1280, 0, 1280, 720);
            } else {
                ctx.drawImage(video, 0, 0, 1280, 720, 0, 0, 1280, 720);
            }
            ctx.restore();
            panel.classList.add('ring-4', 'ring-yellow-400');
            setTimeout(() => panel.classList.remove('ring-4', 'ring-yellow-400'), 300);
        }

        // Drag & Drop Logik (für Touch optimiert)
        let activeDrag = null;
        document.addEventListener('touchstart', (e) => {
            if(e.target.classList.contains('bubble-handle')) {
                activeDrag = e.target.parentElement;
                e.preventDefault();
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if(!activeDrag) return;
            const touch = e.touches[0];
            const panel = activeDrag.parentElement;
            const rect = panel.getBoundingClientRect();
            
            let x = touch.clientX - rect.left;
            let y = touch.clientY - rect.top;
            
            activeDrag.style.left = x + 'px';
            activeDrag.style.top = y + 'px';
            activeDrag.style.transform = 'translate(-50%, -50%)';
        }, {passive: false});

        document.addEventListener('touchend', () => activeDrag = null);

        window.switchCamera = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            window.initCam();
        }

        // Dummy-Funktionen für Common-JS Kompatibilität
        window.clearText = (el, def) => { if(el.innerText.trim() === def) el.innerText = ""; }
        window.resetText = (el, def) => { if(el.innerText.trim() === "") el.innerText = def; }
        window.toggleInfo = () => alert("Hilfe: Tippe auf 📸 zum Fotografieren, ziehe ✥ zum Bewegen.");
        window.goHome = () => window.location.href = '../index.html';

        window.initCam();
    </script>
</body>
</html>
