    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        html { width: 100%; height: 100%; background-color: #0f172a; }
        body { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; margin: 0;
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: manipulation; 
            animation: fadeIn 0.4s ease-out;
            box-sizing: border-box;
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button:active { transform: scale(0.95); transition: transform 0.1s; }
        .rec-active { animation: hardPulse 0.8s cubic-bezier(0.4, 0, 0.6, 1) infinite; background-color: #ef4444 !important; border-color: white !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6) !important; }
        @keyframes hardPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.9; } }
        .playing { box-shadow: 0 0 20px #22c55e; border-color: #86efac !important; }
        .effect-active { border: 4px solid white !important; transform: scale(1.15); box-shadow: 0 0 25px rgba(255,255,255,0.8); z-index: 10; filter: brightness(1.2); }
        /* Countdown Animation */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .move-up { transform: translateY(-45px) scale(0.85); opacity: 0.8; }
        .font-comic { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
    </style>
</head>

                    <button id="btn-rec-2" onclick="toggleRecording(2)" data-no-sound="true" class="w-28 h-28 md:w-36 md:h-36 rounded-full bg-slate-700 border-8 border-slate-600 shadow-2xl flex items-center justify-center transition-all hover:bg-slate-600 hover:scale-105 active:scale-95 group">
                        <div id="icon-rec-2" class="w-10 h-10 md:w-12 md:h-12 bg-red-500 rounded-full shadow-[0_0_20px_rgba(239,68,68,0.5)] group-hover:scale-110 transition-transform"></div>
                    </button>
                    <div id="fx-box-2" class="flex gap-3 w-full justify-center my-2">

                        <button onclick="setEffect(2, 1.7, this)" class="fx-btn-2 w-16 h-16 rounded-2xl bg-yellow-500 text-3xl shadow-lg border-b-4 border-yellow-700 active:border-b-0 active:translate-y-1 transition flex items-center justify-center hover:brightness-110" title="Maus">🐭</button>

    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm items-center justify-center p-4" onclick="toggleInfo()">
        <div class="bg-slate-800 border-4 border-red-500 rounded-[2rem] max-w-lg w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">

    <!-- Countdown Overlay -->

        <div class="text-[10rem] md:text-[15rem] font-black text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] font-comic" id="countdown-text">3</div>
    </div>

    <script>
        // Web Audio Context für Browser-Modus (Visualizer & Playback)
        let webAudioCtx = null;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) webAudioCtx = new AudioContext();
        } catch(e) { console.warn("Web Audio Init Fehler:", e); }
        
        let mediaRec = null; let recInterval = null;
        let visualizerFrame = null;
        let currentAmp = 0;
        const tracks = { 1: { isRecording: false, isPlaying: false, mediaObj: null, src: "track1.aac", hasData: false, timerInt: null, startTime: 0, playbackRate: 1, startTimeout: null, blobUrl: null, stream: null, webAudioSource: null, analyser: null }, 2: { isRecording: false, isPlaying: false, mediaObj: null, src: "track2.aac", hasData: false, timerInt: null, startTime: 0, playbackRate: 1, startTimeout: null, blobUrl: null, stream: null, webAudioSource: null, analyser: null } };
        
        // Tablet Hardening: Kontextmenü deaktivieren
        document.addEventListener('contextmenu', event => event.preventDefault());

        function startVisualizer() {
            if (visualizerFrame) return;
            const c = document.getElementById('visualizer'); 
            if(!c) return; 
            const ctx = c.getContext('2d'); 
            c.width = c.offsetWidth; 
            c.height = c.offsetHeight; 
            function render() { 
                visualizerFrame = requestAnimationFrame(render); 
                ctx.fillStyle = '#1e293b'; 
                ctx.fillRect(0, 0, c.width, c.height); 
                
                const activeRec = tracks[1].isRecording || tracks[2].isRecording; 
                const activePlay = tracks[1].isPlaying || tracks[2].isPlaying;

                if (activeRec) {
                    if (mediaRec) {
                        mediaRec.getCurrentAmplitude(
                            function(amp) {
                                let val = amp;
                                if (val > 1) val = val / 32767;
                                if (val > 1) val = 1;
                                currentAmp = val;
                            },
                            function(e) { }
                        );
                        const wBar = Math.max(10, c.width * currentAmp * 0.9); 
                        ctx.fillStyle = '#ef4444';
                        ctx.fillRect((c.width - wBar) / 2, 0, wBar, c.height);
                    } else {
                        // Warte auf Start (Gelber Strich als Feedback)
                        ctx.fillStyle = '#fbbf24';
                        ctx.fillRect((c.width - 40) / 2, (c.height - 4) / 2, 40, 4);
                    }
                } else if (activePlay) {
                    // Simulation bei Wiedergabe (Grün)
                    const val = Math.random(); 
                    const wBar = Math.max(10, c.width * val * 0.8);
                    ctx.fillStyle = '#22c55e';
                    ctx.fillRect((c.width - wBar) / 2, 0, wBar, c.height);
                } 
            } 
            render(); 
        }

        function stopVisualizer() {
            if (visualizerFrame) {
                cancelAnimationFrame(visualizerFrame);
                visualizerFrame = null;
                const c = document.getElementById('visualizer');
                if(c) {
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(0, 0, c.width, c.height);
                }
            }
        }
        
        function checkVisualizerState() {
            const anyRecording = tracks[1].isRecording || tracks[2].isRecording;
            const anyPlaying = tracks[1].isPlaying || tracks[2].isPlaying;
            if (!anyRecording && !anyPlaying) stopVisualizer();
        }
        
        let recLock = false;
        
        function releaseMic(t) {
            if (t.stream) { t.stream.getTracks().forEach(track => track.stop()); t.stream = null; }
            if (t.webAudioSource) { t.webAudioSource.disconnect(); t.webAudioSource = null; }
            if (t.analyser) { t.analyser.disconnect(); t.analyser = null; }
        }

        async function toggleRecording(id) { 
            if (recLock) return;
            
            const t = tracks[id]; 
            
            if (t.isRecording) {
                stopRecordingActual(id);
                return;
            }

            recLock = true;
            
            // AudioContext wecken! (Wichtig für Safari)
            if (webAudioCtx && webAudioCtx.state === 'suspended') {
                try { await webAudioCtx.resume(); } catch(e) { console.warn(e); }
            }

            // WebRTC Mikrofon BEREITS JETZT anfragen, vor dem Countdown!
            if (!window.cordova && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    t.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    if (webAudioCtx && webAudioCtx.state === 'suspended') await webAudioCtx.resume(); // FIREFOX FIX

                    // VISUALIZER SETUP
                    if (webAudioCtx) {
                        t.webAudioSource = webAudioCtx.createMediaStreamSource(t.stream);
                        t.analyser = webAudioCtx.createAnalyser();
                        t.analyser.fftSize = 256;
                        
                        t.webAudioSource.connect(t.analyser);
                    }
                } catch (e) {
                    alert("Mikrofon nicht gefunden oder Zugriff verweigert!");
                    recLock = false;
                    return;
                }
            }

            // Start Countdown
            const overlay = document.getElementById('countdown-overlay');
            const text = document.getElementById('countdown-text');
            let count = 3;
            overlay.classList.remove('hidden');
            
            const tick = () => {
                text.innerText = count;
                text.classList.remove('animate-pop');
                void text.offsetWidth; 
                text.classList.add('animate-pop');
                window.playSound('click'); 
                
                if (count === 0) {
                    overlay.classList.add('hidden');
                    startRecordingActual(id);
                    recLock = false;
                } else {
                    count--;
                    setTimeout(tick, 1000);
                }
            };
            tick();
        }

        function startRecordingActual(id) {
            const t = tracks[id]; const btn = document.getElementById(`btn-rec-${id}`); const icon = document.getElementById(`icon-rec-${id}`); const playBtn = document.getElementById(`btn-play-${id}`); const delBtn = document.getElementById(`btn-del-${id}`); const fxBox = document.getElementById(`fx-box-${id}`); const timer = document.getElementById(`timer-${id}`);
            startVisualizer();
            currentAmp = 0;
            window.playSound('shutter'); 
            
            if(t.hasData) deleteTrack(id); 
            
            t.isRecording = true; 
            
            btn.classList.add('rec-active'); 
            icon.classList.replace('bg-red-500', 'bg-white'); 
            timer.classList.replace('text-slate-600', 'text-white'); 
            
            // Web Audio Context wecken (für iOS wichtig)
            if (webAudioCtx && webAudioCtx.state === 'suspended') webAudioCtx.resume();

            // Verzögerter Start (1000ms), damit der Shutter-Sound nicht aufgenommen wird
            t.startTimeout = setTimeout(() => {
                t.startTimeout = null; // WICHTIG: Markieren, dass die Wartezeit vorbei ist!

                // Text erst jetzt ausblenden/verschieben
                const txt = document.getElementById('instruction-text');
                if (!txt.classList.contains('text-white')) {
                    txt.classList.add('hidden');
                } else {
                    txt.classList.add('move-up');
                }

                // --- AUFNAHME START ---
                if (window.cordova && typeof Media !== 'undefined') {
                    // 1. NATIVE APP (Cordova)
                    try {
                        if (t.mediaObj) { t.mediaObj.release(); }
                        const fileName = `track${id}.aac`;
                        const path = (cordova.file && cordova.file.dataDirectory) ? cordova.file.dataDirectory + fileName : fileName;
                        t.src = path;
                        t.mediaObj = new Media(path, () => console.log("Rec Success"), (e) => console.error("Rec Error", e));
                        t.mediaObj.startRecord();
                        mediaRec = t.mediaObj; 
                    } catch (e) { alert("Plugin Fehler: " + e.message); return; }
                } else if (t.stream && webAudioCtx) {
                    // 2. WEB BROWSER (Mit dem vorab angefragten Stream)
                    try {
                        t.mediaRecorder = new MediaRecorder(t.stream);
                        t.chunks = [];
                        t.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) t.chunks.push(e.data); };
                        t.mediaRecorder.start(); // FIREFOX FIX: Chunking deaktiviert
                        
                        // Fake mediaRec für Visualizer-Loop
                        mediaRec = {
                            getCurrentAmplitude: (cb) => {
                                if(!t.analyser) { cb(0); return; }
                                const data = new Uint8Array(t.analyser.frequencyBinCount);
                                t.analyser.getByteTimeDomainData(data); // LINUX DC-OFFSET FIX
                                let dc = 0; 
                                for(let i=0; i<data.length; i++) dc += data[i];
                                dc /= data.length; // Die Grundspannung ermitteln
                                let sum = 0;
                                for(let i=0; i<data.length; i++) { const v = (data[i] - dc) / 128.0; sum += v*v; }
                                const rms = Math.sqrt(sum / data.length);
                                cb(Math.min(32767, rms * 32767 * 4)); // Faktor 4 für lebhaften Ausschlag
                            }
                        };
                    } catch(e) {
                        console.error(e);
                        stopRecordingActual(id); // Abbruch
                    }
                } else {
                    alert("Kein Mikrofon gefunden oder nicht unterstützt.");
                    stopRecordingActual(id);
                }

                t.startTime = Date.now(); 
                t.timerInt = setInterval(() => { 
                    const d = Math.floor((Date.now() - t.startTime) / 1000); 
                    timer.innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`; 
                    if (d >= 300) stopRecordingActual(id);
                }, 1000);
            }, 1000); // 1000ms warten (Sicherheitsabstand für Sound)
        }

        function stopRecordingActual(id) {
            const t = tracks[id]; const btn = document.getElementById(`btn-rec-${id}`); const icon = document.getElementById(`icon-rec-${id}`); const timer = document.getElementById(`timer-${id}`);
            const playBtn = document.getElementById(`btn-play-${id}`); const delBtn = document.getElementById(`btn-del-${id}`);
            
            // Falls Stop gedrückt wird, bevor Aufnahme startete (während Delay)
            if (t.startTimeout) {
                clearTimeout(t.startTimeout);
                t.startTimeout = null;
                
                // ABBRUCH: Aufnahme hat nie begonnen -> Alles zurücksetzen
                t.isRecording = false;
                btn.classList.remove('rec-active');
                icon.classList.replace('bg-white', 'bg-red-500');
                timer.classList.replace('text-white', 'text-slate-600');
                
                // Text wieder anzeigen
                const txt = document.getElementById('instruction-text');
                txt.classList.remove('hidden', 'move-up');
                
                releaseMic(t);
                checkVisualizerState();
                return; // WICHTIG: Hier beenden, damit keine Buttons erscheinen!
            }

            if (window.cordova && t.mediaObj) {
                // Native Stop
                try { t.mediaObj.stopRecord(); t.mediaObj.release(); t.mediaObj = null; } catch(e){}
                releaseMic(t);
            } else if (t.mediaRecorder) {
                // Web Stop
                t.mediaRecorder.onstop = () => {
                    releaseMic(t); // WICHTIG: Erst nach der Datei das Mikro freigeben!
                    if (t.chunks.length > 0) {
                        const mimeType = t.mediaRecorder.mimeType || 'audio/webm';
                        const blob = new Blob(t.chunks, { type: mimeType });
                        if (t.blobUrl) URL.revokeObjectURL(t.blobUrl);
                        t.blobUrl = URL.createObjectURL(blob);
                    }
                    t.mediaRecorder = null;
                };
                if (t.mediaRecorder.state !== 'inactive') {
                    try { t.mediaRecorder.requestData(); } catch(e) {}
                    t.mediaRecorder.stop();
                } else {
                    releaseMic(t);
                }
            } else {
                releaseMic(t);
            }
            mediaRec = null;

            t.isRecording = false; 
            t.hasData = true;
            
            clearInterval(t.timerInt); 
            btn.classList.remove('rec-active'); 
            icon.classList.replace('bg-white', 'bg-red-500'); 
            timer.classList.replace('text-white', 'text-slate-600');
            
            playBtn.classList.remove('invisible'); 
            delBtn.classList.remove('invisible'); 
            window.playSound('success');
            
            // Text wieder normal anzeigen
            const txt = document.getElementById('instruction-text');
            txt.classList.remove('hidden');
            txt.classList.remove('move-up');
            
            checkVisualizerState();
        }

        function setEffect(id, rate, btn) { 
            window.playSound('click'); 
            tracks[id].playbackRate = rate; 
            
            // UI Update: Alle Buttons in der Box zurücksetzen
            const box = document.getElementById(`fx-box-${id}`);
            if (box) {
                const btns = box.getElementsByTagName('button');
                for (let i = 0; i < btns.length; i++) btns[i].classList.remove('effect-active', 'ring-4', 'ring-white');
            }
            
            // Aktiven Button markieren
            if(btn) btn.classList.add('effect-active', 'ring-4', 'ring-white');
        }
        
        function playTrack(id) { 
            const t = tracks[id]; 
            if(!t.hasData) return; 
            window.playSound('click'); 
            const btn = document.getElementById(`btn-play-${id}`); 
            
            // Wenn wir gerade abspielen, stoppen wir (einfach neu laden)
            if (btn.classList.contains('playing')) {
                if(t.webAudioSource) { try { t.webAudioSource.stop(); } catch(e){} t.webAudioSource = null; }
                t.isPlaying = false;
                btn.classList.remove('playing'); 
                btn.innerHTML = "<span>▶️</span> ANHÖREN";
                checkVisualizerState();
                return;
            }
            
            // Web Audio Context wecken
            if (webAudioCtx && webAudioCtx.state === 'suspended') webAudioCtx.resume();

            // Helper zum Abspielen via Web Audio (garantiert Pitch-Effekt)
            const playBuffer = (arrayBuffer) => {
                webAudioCtx.decodeAudioData(arrayBuffer, (audioBuffer) => {
                    const source = webAudioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.playbackRate.value = t.playbackRate;
                    source.connect(webAudioCtx.destination);
                    source.onended = () => { 
                        t.isPlaying = false; 
                        btn.classList.remove('playing'); 
                        btn.innerHTML = "<span>▶️</span> ANHÖREN"; 
                        checkVisualizerState(); 
                        t.webAudioSource = null;
                    };
                    source.start(0);
                    t.webAudioSource = source;
                    
                    t.isPlaying = true;
                    startVisualizer();
                    btn.classList.add('playing'); 
                    btn.innerHTML = "<span>⏹</span> STOP";
                }, (e) => { console.error("Decode Error", e); alert("Audio Fehler"); });
            };

            if (window.cordova && typeof Media !== 'undefined') {
                // 1. NATIVE APP: Datei lesen -> ArrayBuffer -> Web Audio
                window.resolveLocalFileSystemURL(t.src, function(fileEntry) {
                    fileEntry.file(function(file) {
                        var reader = new FileReader();
                        reader.onloadend = function() {
                            playBuffer(this.result);
                        };
                        reader.readAsArrayBuffer(file);
                    });
                }, function(e) { console.error("File Error", e); alert("Datei nicht gefunden"); });
            } else {
                // 2. WEB BROWSER: Blob -> ArrayBuffer -> Web Audio
                if (t.blobUrl) {
                    fetch(t.blobUrl)
                        .then(r => r.arrayBuffer())
                        .then(b => playBuffer(b))
                        .catch(e => console.error(e));
                }
            }
        }
        function deleteTrack(id) { 
            window.playSound('click'); 
            const t = tracks[id]; 
            if(t.mediaObj) { t.mediaObj.stop(); t.mediaObj.release(); t.mediaObj = null; }
            t.hasData = false; 
            document.getElementById(`btn-play-${id}`).classList.add('invisible'); 
            document.getElementById(`btn-del-${id}`).classList.add('invisible'); 
            document.getElementById(`timer-${id}`).innerText = "00:00"; 
        }
        
        const questions = [
            "Was würdest du tun, wenn du unsichtbar wärst? 👻",
            "Wenn du ein Tier wärst, welches wärst du? 🦁",
            "Was ist dein absolutes Lieblingsessen? 🍕",
            "Welche Superkraft hättest du gerne? ⚡",
            "Was war dein lustigstes Erlebnis? 😂",
            "Wohin würdest du gerne mal reisen? 🌍",
            "Was würdest du als König/Königin bestimmen? 👑",
            "Erfinde ein neues Wort! Was bedeutet es? 📖",
            "Was ist dein liebstes Hobby? ⚽",
            "Erzähl mir deinen besten Witz! 🤡",
            "Was macht dich richtig glücklich? ☀️",
            "Welches Tier magst du gar nicht? 🕷️"
        ];

        function newQuestion() {
            window.playSound('click');
            const txt = document.getElementById('instruction-text');
            const q = questions[Math.floor(Math.random() * questions.length)];
            
            txt.innerText = q;
            txt.classList.remove('hidden');
            txt.classList.remove('text-slate-500');
            txt.classList.add('text-white', 'drop-shadow-md');
        }
        
    </script>
