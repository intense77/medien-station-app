<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Optimierung für Smartphone Querformat */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3rem !important; margin-bottom: 0 !important; }
            .bg-selector-grid { grid-template-columns: repeat(4, 1fr) !important; width: auto !important; }
            .bg-btn { width: 3.5rem !important; height: 3.5rem !important; }
        }
    </style>
</head>
<body class="p-2 md:p-4 box-border bg-slate-900">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="hidden md:block absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 text-2xl lg:text-4xl font-black text-purple-400 tracking-widest drop-shadow-lg pointer-events-none z-10 uppercase">
            Magic Booth
        </h1>

        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="flex-1 flex flex-col md:flex-row landscape:flex-row gap-2 md:gap-4 min-h-0 w-full max-w-[95rem] mx-auto overflow-hidden">
        
        <div class="bg-selector-grid flex-none grid grid-cols-4 md:grid-cols-2 gap-2 p-1 no-scrollbar md:w-56 landscape:md:w-60 overflow-y-auto">
            <button onclick="window.setBg('space')" class="bg-btn w-full aspect-square rounded-xl bg-indigo-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🚀</button>
            <button onclick="window.setBg('jungle')" class="bg-btn w-full aspect-square rounded-xl bg-emerald-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🌴</button>
            <button onclick="window.setBg('underwater')" class="bg-btn w-full aspect-square rounded-xl bg-blue-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🐙</button>
            <button onclick="window.setBg('paris')" class="bg-btn w-full aspect-square rounded-xl bg-pink-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🗼</button>
            <button onclick="window.setBg('wolken')" class="bg-btn w-full aspect-square rounded-xl bg-sky-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">☁️</button>
            <button onclick="window.setBg('schloss')" class="bg-btn w-full aspect-square rounded-xl bg-purple-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🏰</button>
            <button onclick="window.setBg('dino')" class="bg-btn w-full aspect-square rounded-xl bg-orange-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">🦖</button>
            <button onclick="window.setBg('stadion')" class="bg-btn w-full aspect-square rounded-xl bg-green-900 border-2 border-white flex items-center justify-center text-xl md:text-4xl shadow-lg active:scale-90">⚽</button>
        </div>

        <div class="flex-1 flex flex-col min-h-0 w-full gap-2 md:gap-4 overflow-hidden">
            <div class="flex-1 bg-black rounded-[1.5rem] md:rounded-[2.5rem] border-4 md:border-[8px] border-slate-700 shadow-2xl relative overflow-hidden min-h-0">
                <div id="stage-container" class="absolute inset-0 w-full h-full flex items-center justify-center">
                    <video id="video" autoplay playsinline muted class="hidden"></video>
                    <canvas id="output_canvas" class="w-full h-full object-contain block"></canvas>
                </div>

                <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-40">
                    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="font-black text-purple-400 animate-pulse text-xs uppercase">Zauberkraft lädt...</p>
                </div>
            </div>

            <div class="flex-none h-16 md:h-24 flex justify-center items-center gap-3 md:gap-6 px-2 mb-1">
                <button onclick="window.switchCamera()" class="w-14 h-14 md:w-20 md:h-20 bg-slate-800 text-white rounded-xl md:rounded-2xl shadow-xl border-b-4 md:border-b-8 border-slate-900 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center">
                    <span class="text-2xl md:text-4xl">🔄</span>
                </button>
                <button onclick="window.startCountdown()" class="flex-1 max-w-[250px] md:max-w-xs h-14 md:h-20 bg-purple-600 text-white font-black rounded-xl md:rounded-2xl shadow-xl border-b-4 md:border-b-8 border-purple-900 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2">
                    <span class="text-lg md:text-3xl">✨ FOTO</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ... (Script-Teil bleibt identisch, da die Logik bereits funktionierte) ...
        // Stelle sicher, dass renderLoop und initCam wie zuvor implementiert sind.
        
        // Kleine Ergänzung für den Grid-Hintergrund Support:
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        let currentStream;
        let currentFacingMode = 'user';
        let activeBg = 'space';

        // Pfade zu den Assets
        const bgs = {
            space: new Image(), jungle: new Image(), underwater: new Image(),
            paris: new Image(), wolken: new Image(), schloss: new Image(),
            dino: new Image(), stadion: new Image()
        };
        bgs.space.src = '../assets/weltraum.jpg';
        bgs.jungle.src = '../assets/dschungel.jpg';
        bgs.underwater.src = '../assets/unterwasser.jpg';
        bgs.paris.src = '../assets/paris.jpg';
        bgs.wolken.src = '../assets/wolken.jpg';
        bgs.schloss.src = '../assets/schloss.jpg';
        bgs.dino.src = '../assets/dino.jpg';
        bgs.stadion.src = '../assets/stadion.jpg';

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);
        let isRunning = false;

        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: {ideal: 1280}, height: {ideal: 720}, facingMode: {ideal: currentFacingMode} }
                });
                video.srcObject = currentStream;
                await video.play();
                isRunning = true;
                renderLoop();
            } catch (err) {
                console.error(err);
            }
        }

        async function renderLoop() {
            if (!isRunning) return;
            if (video.readyState >= 2) await selfieSegmentation.send({image: video});
            requestAnimationFrame(renderLoop);
        }

        function onResults(results) {
            loadingEl.style.display = 'none';
            canvas.width = results.image.width;
            canvas.height = results.image.height;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentFacingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }

            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-atop';

            const img = bgs[activeBg];
            if (img && img.complete) {
                const cRatio = canvas.width / canvas.height;
                const iRatio = img.width / img.height;
                let dW = canvas.width, dH = canvas.height, dX = 0, dY = 0;
                if (iRatio > cRatio) { dW = canvas.height * iRatio; dX = (canvas.width - dW) / 2; } 
                else { dH = canvas.width / iRatio; dY = (canvas.height - dH) / 2; }
                ctx.drawImage(img, dX, dY, dW, dH);
            }
            ctx.restore();
        }

        window.setBg = (bg) => { activeBg = bg; if(window.playSound) window.playSound('click'); };
        window.goHome = () => window.location.href = '../index.html';
        window.switchCamera = () => { currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; initCam(); };
        
        window.addEventListener('load', () => setTimeout(initCam, 800));
    </script>
</body>
</html>
