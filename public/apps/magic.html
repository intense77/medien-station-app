<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: manipulation; 
            height: 100dvh;
            margin: 0;
        }

        video, canvas { display: block; border-radius: inherit; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Optimierung für Smartphone Querformat */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3.5rem !important; margin-bottom: 0 !important; }
            .side-bar { width: 4.5rem !important; padding: 0.25rem !important; gap: 0.5rem !important; }
            .side-btn { height: 3.5rem !important; width: 3.5rem !important; font-size: 1.5rem !important; }
            .action-area { height: 4rem !important; }
            .video-main { border-width: 4px !important; }
        }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .font-comic { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 box-border bg-slate-900">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="hidden md:block absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 text-2xl lg:text-5xl font-black text-purple-400 tracking-wider drop-shadow-lg pointer-events-none z-10 uppercase">
            MAGIC BOOTH
        </h1>

        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="flex-1 flex flex-col md:flex-row landscape:flex-row gap-2 md:gap-4 min-h-0 w-full max-w-[95rem] mx-auto overflow-hidden">
        
        <div class="side-bar flex-none w-full md:w-32 bg-slate-800 p-2 md:p-3 rounded-xl md:rounded-[2rem] border-4 border-slate-700 shadow-2xl flex flex-row md:flex-col gap-2 overflow-x-auto md:overflow-y-auto no-scrollbar items-center justify-start h-auto md:h-full">
            <button onclick="window.setBg('space', this)" class="bg-btn side-btn ring-4 ring-yellow-400 flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-indigo-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🚀</button>
            <button onclick="window.setBg('jungle', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-emerald-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🌴</button>
            <button onclick="window.setBg('underwater', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-blue-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🐙</button>
            <button onclick="window.setBg('paris', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-pink-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🗼</button>
            <button onclick="window.setBg('wolken', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-sky-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">☁️</button>
            <button onclick="window.setBg('schloss', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-purple-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🏰</button>
            <button onclick="window.setBg('dino', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-orange-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">🦖</button>
            <button onclick="window.setBg('stadion', this)" class="bg-btn side-btn flex-none w-16 h-16 md:w-full md:h-20 rounded-xl bg-green-900 border-2 border-white text-2xl md:text-4xl shadow-md active:scale-95 transition flex items-center justify-center">⚽</button>
        </div>

        <div class="flex-1 flex flex-col min-h-0 w-full gap-2">
            <div class="video-main relative flex-1 min-h-0 w-full bg-slate-800 rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border-4 md:border-[8px] border-slate-700 shadow-2xl flex items-center justify-center">
                <video id="video" autoplay playsinline muted class="absolute w-[1px] h-[1px] opacity-0 pointer-events-none z-[-1]"></video>
                <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-contain block"></canvas>
                
                <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-40">
                    <div class="w-12 h-12 border-8 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div class="text-purple-400 font-bold animate-pulse">Magie wird geladen...</div>
                </div>

                <div id="countdown" class="absolute inset-0 flex items-center justify-center hidden bg-black/50 backdrop-blur-sm z-30">
                    <div id="countdown-text" class="text-[8rem] md:text-[12rem] font-black text-white font-comic">3</div>
                </div>
            </div>

            <div class="action-area h-16 md:h-24 flex-none shrink-0 w-full flex items-center justify-center gap-4 px-2">
                <button onclick="window.switchCamera()" class="w-12 h-12 md:w-20 md:h-20 bg-slate-700 hover:bg-slate-600 text-white rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-slate-900 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center shrink-0 shadow-xl" title="Kamera wechseln">
                    <span class="text-2xl md:text-4xl">🔄</span>
                </button>
                <button onclick="window.startCountdown()" class="flex-1 max-w-sm h-12 md:h-20 bg-purple-600 hover:bg-purple-500 text-white text-xl md:text-4xl font-black rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-purple-800 active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2 md:gap-4 shadow-[0_0_15px_rgba(147,51,234,0.4)] hover:shadow-[0_0_30px_rgba(147,51,234,0.6)] group">
                    <span class="group-hover:scale-110 transition-transform duration-300">✨</span> ZAUBERN!
                </button>
            </div>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="preview-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4 md:p-8 pb-6 md:pb-10">
        <h2 class="flex-none text-2xl md:text-4xl font-black text-white mb-4 md:mb-6">Dein Zauber Selfie!</h2>
        <div class="relative w-full max-w-[95%] lg:max-w-[80%] flex-1 min-h-0 border-4 md:border-8 border-white shadow-2xl rounded-xl md:rounded-3xl overflow-hidden bg-black flex items-center justify-center">
            <img id="preview-img-display" class="w-full h-full object-contain" src="">
        </div>
        <div class="flex-none flex flex-wrap justify-center gap-2 md:gap-6 mt-4 md:mt-8 w-full max-w-3xl px-1">
            <button onclick="window.closePreview()" class="flex-1 bg-yellow-500 text-black font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-yellow-700 active:translate-y-1 active:border-b-0">🔄 NOCHMAL</button>
            <button onclick="window.saveFromPreview()" class="flex-1 bg-purple-600 text-white font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-purple-800 active:translate-y-1 active:border-b-0">💾 SPEICHERN</button>
            <button onclick="window.printFromPreview(this)" class="flex-1 bg-white text-black font-black py-3 rounded-xl text-xs md:text-2xl border-b-4 border-gray-400 active:translate-y-1 active:border-b-0">🖨️ DRUCKEN</button>
        </div>
    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-purple-500 rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo()" class="absolute top-6 right-6 text-white hover:text-purple-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-3xl md:text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4">
                <span>✨ ANLEITUNG</span>
                <button onclick="window.speakText('Anleitung für Zauber Selfie. Wähle links einen Hintergrund. Drücke unten auf ZAUBERN. Stell dich vor die Kamera, und schwupps bist du in einer anderen Welt!', event)" class="ml-auto mr-12 md:mr-16 bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 md:w-14 md:h-14 flex items-center justify-center shadow-lg border-2 border-slate-500 active:scale-95 transition-all text-xl md:text-3xl shrink-0" title="Vorlesen">🔊</button>
            </h2>
            <div class="text-lg text-slate-300 space-y-4">
                <p>1. Wähle links einen <b>Hintergrund</b>.</p>
                <p>2. Drücke unten auf <b>ZAUBERN!</b>.</p>
                <p>3. Stell dich vor die Kamera, und schwupps bist du in einer anderen Welt!</p>
            </div>
            <button onclick="window.toggleInfo()" class="mt-8 w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        let currentStream, currentFacingMode = 'user', activeBg = 'space', isRunning = false;

        const bgs = {
            space: new Image(), jungle: new Image(), underwater: new Image(),
            paris: new Image(), wolken: new Image(), schloss: new Image(),
            dino: new Image(), stadion: new Image()
        };
        bgs.space.src = '../assets/weltraum.jpg'; bgs.jungle.src = '../assets/dschungel.jpg';
        bgs.underwater.src = '../assets/unterwasser.jpg'; bgs.paris.src = '../assets/paris.jpg';
        bgs.wolken.src = '../assets/wolken.jpg'; bgs.schloss.src = '../assets/schloss.jpg';
        bgs.dino.src = '../assets/dino.jpg'; bgs.stadion.src = '../assets/stadion.jpg';

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);

        // --- ROBUSTE KAMERA ---
        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            
            const constraints = [
                { video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } },
                { video: true }
            ];

            for (let c of constraints) {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia(c);
                    video.srcObject = currentStream;
                    
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => resolve();
                    });
                    
                    await video.play();
                    isRunning = true;
                    renderLoop();
                    return;
                } catch (e) { console.warn("Versuch fehlgeschlagen", e); }
            }
            alert("Kamera nicht gefunden!");
        }

        async function renderLoop() {
            if (isRunning && video.readyState >= 2 && video.videoWidth > 0) {
                try {
                    await selfieSegmentation.send({image: video});
                } catch (e) {
                    console.error("MediaPipe Processing Fehler:", e);
                }
            }
            if (isRunning) requestAnimationFrame(renderLoop);
        }

        function onResults(results) {
            loadingEl.style.display = 'none';
            canvas.width = results.image.width; canvas.height = results.image.height;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentFacingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-atop';
            const img = bgs[activeBg];
            if (img && img.complete) {
                const cRatio = canvas.width / canvas.height, iRatio = img.width / img.height;
                let dW = canvas.width, dH = canvas.height, dX = 0, dY = 0;
                if (iRatio > cRatio) { dW = canvas.height * iRatio; dX = (canvas.width - dW) / 2; } else { dH = canvas.width / iRatio; dY = (canvas.height - dH) / 2; }
                ctx.drawImage(img, dX, dY, dW, dH);
            } else {
                ctx.fillStyle = "#0f172a"; ctx.fillRect(0,0,canvas.width, canvas.height);
            }
            ctx.restore();
        }

        // --- AKTIONEN ---
        window.startCountdown = () => {
            if(window.playSound) window.playSound('click');
            const overlay = document.getElementById('countdown');
            const textEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            
            let count = 3;
            const tick = () => {
                textEl.innerText = count;
                textEl.classList.remove('animate-pop');
                void textEl.offsetWidth; 
                textEl.classList.add('animate-pop');
                
                if (count === 0) {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                    window.capturePhoto();
                } else {
                    count--;
                    if(window.playSound && count > 0) window.playSound('click');
                    setTimeout(tick, 1000);
                }
            };
            tick();
        };

        window.capturePhoto = () => {
            if(window.playSound) window.playSound('shutter');
            isRunning = false;
            document.getElementById('preview-img-display').src = canvas.toDataURL('image/png');
            const overlay = document.getElementById('preview-overlay');
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
        };

        window.closePreview = () => {
            if(window.playSound) window.playSound('click');
            const overlay = document.getElementById('preview-overlay');
            overlay.classList.add('hidden');
            overlay.style.display = 'none';
            isRunning = true; renderLoop();
        };

        window.saveFromPreview = () => {
            if(window.playSound) window.playSound('success');
            const a = document.createElement('a');
            a.href = document.getElementById('preview-img-display').src;
            a.download = 'magic_selfie.png'; a.click();
        };

        window.printFromPreview = (btn) => {
            if(window.playSound) window.playSound('click');
            if(window.printImage) window.printImage(document.getElementById('preview-img-display').src, 'Selfie', btn);
        };

        window.setBg = (bg, btn) => { 
            activeBg = bg; 
            if(window.playSound) window.playSound('click'); 
            if (btn) {
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('ring-4', 'ring-yellow-400'));
                btn.classList.add('ring-4', 'ring-yellow-400');
            }
        };
        
        window.switchCamera = () => { 
            if(window.playSound) window.playSound('click'); 
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; 
            initCam(); 
        };

        window.addEventListener('load', () => setTimeout(initCam, 800));
    </script>
</body>
</html>
