<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh; 
            width: 100vw; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
        }

        /* Standard-Layout: Alles untereinander */
        .main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            padding: 0.5rem;
            gap: 0.5rem;
        }

        /* Canvas-Bereich */
        .stage-frame {
            flex: 1;
            background: black;
            border: 4px solid #334155;
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* Smartphone Querformat Optimierung */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3rem !important; margin-bottom: 0 !important; }
            .header-area h1 { display: none; } /* Titel weg für mehr Platz */
            
            .main-container {
                flex-direction: row !important; /* Hintergründe links, Bild Mitte */
                padding-bottom: 0.5rem;
            }

            .bg-selector {
                width: 5rem !important;
                grid-template-columns: 1fr !important; /* Nur 1 Spalte links */
                overflow-y: auto;
            }

            .footer-area {
                position: static !important;
                flex-direction: column !important; /* Buttons rechts übereinander */
                width: 5rem !important;
                height: 100% !important;
                padding: 0 !important;
                background: transparent !important;
            }

            .footer-area button {
                width: 4rem !important;
                height: 4rem !important;
            }
        }

        /* Tablet/Laptop Querformat (breiter) */
        @media (min-width: 1024px) {
            .main-container { flex-direction: row; }
            .bg-selector { width: 12rem; grid-template-columns: 1fr 1fr; }
            .footer-area { width: 10rem; flex-direction: column; position: static; background: transparent; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="box-border">

    <header class="header-area h-16 flex justify-between items-center px-4 shrink-0 z-50">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 border-slate-600 px-4 py-2 rounded-full font-black text-sm active:scale-95">🏠 MENÜ</button>
        <h1 class="text-purple-400 font-black uppercase tracking-widest">Magic Booth</h1>
        <button onclick="window.toggleInfo()" class="w-10 h-10 bg-slate-800 rounded-full font-bold border-2 border-slate-600">?</button>
    </header>

    <div class="main-container">
        
        <div class="bg-selector grid grid-cols-4 gap-2 overflow-y-auto no-scrollbar shrink-0">
            <button onclick="window.setBg('space')" class="aspect-square rounded-xl bg-indigo-900 border-2 border-white text-2xl">🚀</button>
            <button onclick="window.setBg('jungle')" class="aspect-square rounded-xl bg-emerald-900 border-2 border-white text-2xl">🌴</button>
            <button onclick="window.setBg('underwater')" class="aspect-square rounded-xl bg-blue-900 border-2 border-white text-2xl">🐙</button>
            <button onclick="window.setBg('paris')" class="aspect-square rounded-xl bg-pink-900 border-2 border-white text-2xl">🗼</button>
            <button onclick="window.setBg('wolken')" class="aspect-square rounded-xl bg-sky-900 border-2 border-white text-2xl">☁️</button>
            <button onclick="window.setBg('schloss')" class="aspect-square rounded-xl bg-purple-900 border-2 border-white text-2xl">🏰</button>
            <button onclick="window.setBg('dino')" class="aspect-square rounded-xl bg-orange-900 border-2 border-white text-2xl">🦖</button>
            <button onclick="window.setBg('stadion')" class="aspect-square rounded-xl bg-green-900 border-2 border-white text-2xl">⚽</button>
        </div>

        <div class="stage-frame">
            <video id="video" autoplay playsinline muted class="hidden"></video>
            <canvas id="output_canvas" class="w-full h-full object-contain block"></canvas>
            <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center">
                <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <footer class="footer-area flex justify-center items-center gap-4 py-2 shrink-0">
            <button onclick="window.switchCamera()" class="w-16 h-16 bg-slate-800 text-white rounded-2xl border-b-4 border-slate-950 flex items-center justify-center text-3xl shadow-2xl active:translate-y-1 active:border-b-0">🔄</button>
            <button onclick="window.startCountdown()" class="w-16 h-16 md:w-48 bg-purple-600 text-white font-black rounded-2xl border-b-4 border-purple-900 flex items-center justify-center text-3xl md:text-2xl shadow-2xl active:translate-y-1 active:border-b-0">✨</button>
        </footer>
    </div>

    <script>
        // ... (Der Script-Teil bleibt identisch zum vorherigen funktionierenden Code) ...
    </script>
</body>
</html>
