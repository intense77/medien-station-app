<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* 1. Hauptbereich: Nimmt den verfügbaren Platz ein */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
            padding-bottom: 8rem; /* Platzhalter für die fixierten Buttons unten */
            min-height: 0;
        }

        /* 2. Kamera-Rahmen: Muss schrumpfen können */
        .stage-frame {
            flex: 1;
            background: black;
            border: 4px solid #334155;
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            min-height: 0; 
        }

        /* 3. FIXIERTER FOOTER: Hier liegt die Lösung */
        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 7rem; /* Feste Höhe für die Button-Zone */
            background: linear-gradient(to top, #0f172a 70%, transparent);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100; /* Immer ganz oben */
            pointer-events: none; /* Klicks gehen durch den Hintergrund... */
        }

        .fixed-footer button {
            pointer-events: auto; /* ...aber die Buttons fangen sie ab! */
        }

        /* Laptop Landscape Fix */
        @media (min-width: 768px) {
            .main-content {
                flex-direction: row;
                padding-bottom: 1rem;
            }
            .fixed-footer {
                position: relative;
                height: auto;
                background: transparent;
                flex-direction: column;
                width: 8rem;
                padding: 0;
            }
        }
    </style>
</head>
<body class="box-border">

    <header class="h-16 flex justify-between items-center px-4 shrink-0">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 border-slate-600 px-4 py-2 rounded-full font-black text-sm active:scale-95">🏠 MENÜ</button>
        <h1 class="text-purple-400 font-black uppercase tracking-widest hidden md:block">Magic Booth</h1>
        <button onclick="window.toggleInfo()" class="w-10 h-10 bg-slate-800 rounded-full font-bold border-2 border-slate-600">?</button>
    </header>

    <main class="main-content">
        <div class="bg-selector grid grid-cols-4 md:grid-cols-2 gap-2 mb-2 md:mb-0 md:mr-4 md:w-48 shrink-0 overflow-y-auto no-scrollbar">
            <button onclick="window.setBg('space')" class="aspect-square rounded-xl bg-indigo-900 border-2 border-white text-2xl">🚀</button>
            <button onclick="window.setBg('jungle')" class="aspect-square rounded-xl bg-emerald-900 border-2 border-white text-2xl">🌴</button>
            <button onclick="window.setBg('underwater')" class="aspect-square rounded-xl bg-blue-900 border-2 border-white text-2xl">🐙</button>
            <button onclick="window.setBg('paris')" class="aspect-square rounded-xl bg-pink-900 border-2 border-white text-2xl">🗼</button>
            <button onclick="window.setBg('wolken')" class="aspect-square rounded-xl bg-sky-900 border-2 border-white text-2xl">☁️</button>
            <button onclick="window.setBg('schloss')" class="aspect-square rounded-xl bg-purple-900 border-2 border-white text-2xl">🏰</button>
            <button onclick="window.setBg('dino')" class="aspect-square rounded-xl bg-orange-900 border-2 border-white text-2xl">🦖</button>
            <button onclick="window.setBg('stadion')" class="aspect-square rounded-xl bg-green-900 border-2 border-white text-2xl">⚽</button>
        </div>

        <div class="stage-frame">
            <video id="video" autoplay playsinline muted class="hidden"></video>
            <canvas id="output_canvas" class="w-full h-full object-contain block"></canvas>
            <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center">
                <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <footer class="fixed-footer">
        <button onclick="window.switchCamera()" class="w-16 h-16 bg-slate-800 text-white rounded-2xl border-b-4 border-slate-950 flex items-center justify-center text-3xl shadow-2xl active:translate-y-1 active:border-b-0">🔄</button>
        <button onclick="window.startCountdown()" class="w-48 h-16 bg-purple-600 text-white font-black rounded-2xl border-b-4 border-purple-900 flex items-center justify-center text-2xl shadow-2xl active:translate-y-1 active:border-b-0">✨ FOTO</button>
    </footer>

    <script>
        // ... (Kamera- und KI-Logik bleibt gleich) ...
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        let currentStream, currentFacingMode = 'user', activeBg = 'space', isRunning = false;

        const bgs = {
            space: new Image(), jungle: new Image(), underwater: new Image(),
            paris: new Image(), wolken: new Image(), schloss: new Image(),
            dino: new Image(), stadion: new Image()
        };
        // WICHTIG: Hier deine Pfade einfügen
        bgs.space.src = '../assets/weltraum.jpg'; bgs.jungle.src = '../assets/dschungel.jpg';
        bgs.underwater.src = '../assets/unterwasser.jpg'; bgs.paris.src = '../assets/paris.jpg';
        bgs.wolken.src = '../assets/wolken.jpg'; bgs.schloss.src = '../assets/schloss.jpg';
        bgs.dino.src = '../assets/dino.jpg'; bgs.stadion.src = '../assets/stadion.jpg';

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);

        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: currentFacingMode } });
                video.srcObject = currentStream;
                await video.play();
                isRunning = true;
                renderLoop();
            } catch (err) { console.error(err); }
        }

        async function renderLoop() {
            if (isRunning && video.readyState >= 2) await selfieSegmentation.send({image: video});
            requestAnimationFrame(renderLoop);
        }

        function onResults(results) {
            loadingEl.style.display = 'none';
            canvas.width = results.image.width; canvas.height = results.image.height;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentFacingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-atop';
            const img = bgs[activeBg];
            if (img && img.complete) {
                const cRatio = canvas.width / canvas.height, iRatio = img.width / img.height;
                let dW = canvas.width, dH = canvas.height, dX = 0, dY = 0;
                if (iRatio > cRatio) { dW = canvas.height * iRatio; dX = (canvas.width - dW) / 2; } else { dH = canvas.width / iRatio; dY = (canvas.height - dH) / 2; }
                ctx.drawImage(img, dX, dY, dW, dH);
            }
            ctx.restore();
        }

        window.setBg = (bg) => { activeBg = bg; if(window.playSound) window.playSound('click'); };
        window.switchCamera = () => { currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; initCam(); };
        window.goHome = () => window.location.href = '../index.html';
        window.addEventListener('load', () => setTimeout(initCam, 800));
    </script>
</body>
</html>
