<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root {
            --header-h: 60px;
            --footer-h: 100px;
        }

        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh; 
            width: 100vw; 
            margin: 0; 
            display: grid;
            /* Definiert 3 feste Bereiche: Header, Main (flexibel), Footer (fest) */
            grid-template-rows: var(--header-h) 1fr var(--footer-h);
        }

        /* Hauptbereich: Bild und Hintergründe */
        .main-stage {
            display: flex;
            flex-direction: column;
            min-height: 0; /* WICHTIG: Erlaubt dem Container zu schrumpfen */
            padding: 8px;
            gap: 8px;
        }

        .stage-frame {
            flex: 1;
            background: black;
            border: 4px solid #334155;
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* Smartphone Querformat Optimierung */
        @media (orientation: landscape) {
            :root {
                --header-h: 50px;
                --footer-h: 0px; /* Buttons wandern nach rechts */
            }
            body {
                grid-template-rows: var(--header-h) 1fr;
            }
            .main-stage {
                flex-direction: row !important;
                padding-right: 100px; /* Platz für fixierte Buttons rechts */
            }
            .bg-selector {
                width: 80px !important;
                grid-template-columns: 1fr !important;
            }
            .fixed-controls-landscape {
                position: fixed;
                right: 10px;
                top: 60px;
                bottom: 10px;
                width: 80px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 15px;
                z-index: 100;
            }
        }

        /* Desktop/Laptop Layout */
        @media (min-width: 1024px) {
            .main-stage { flex-direction: row !important; }
            .bg-selector { width: 200px !important; grid-template-columns: 1fr 1fr !important; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="box-border">

    <header class="flex justify-between items-center px-4 z-50">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 border-slate-600 px-4 py-2 rounded-full font-black text-xs active:scale-95">🏠 MENÜ</button>
        <h1 class="text-purple-400 font-black uppercase tracking-widest hidden md:block">Magic Booth</h1>
        <button onclick="window.toggleInfo()" class="w-10 h-10 bg-slate-800 rounded-full font-bold border-2 border-slate-600">?</button>
    </header>

    <main class="main-stage">
        <div class="bg-selector grid grid-cols-4 md:grid-cols-2 gap-2 overflow-y-auto no-scrollbar shrink-0">
            <button onclick="window.setBg('space')" class="aspect-square rounded-xl bg-indigo-900 border-2 border-white text-2xl">🚀</button>
            <button onclick="window.setBg('jungle')" class="aspect-square rounded-xl bg-emerald-900 border-2 border-white text-2xl">🌴</button>
            <button onclick="window.setBg('underwater')" class="aspect-square rounded-xl bg-blue-900 border-2 border-white text-2xl">🐙</button>
            <button onclick="window.setBg('paris')" class="aspect-square rounded-xl bg-pink-900 border-2 border-white text-2xl">🗼</button>
            <button onclick="window.setBg('wolken')" class="aspect-square rounded-xl bg-sky-900 border-2 border-white text-2xl">☁️</button>
            <button onclick="window.setBg('schloss')" class="aspect-square rounded-xl bg-purple-900 border-2 border-white text-2xl">🏰</button>
            <button onclick="window.setBg('dino')" class="aspect-square rounded-xl bg-orange-900 border-2 border-white text-2xl">🦖</button>
            <button onclick="window.setBg('stadion')" class="aspect-square rounded-xl bg-green-900 border-2 border-white text-2xl">⚽</button>
        </div>

        <div class="stage-frame">
            <video id="video" autoplay playsinline muted class="absolute w-[1px] h-[1px] opacity-0 pointer-events-none z-[-1]"></video>
            <canvas id="output_canvas" class="w-full h-full object-contain block"></canvas>
            <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-40">
                <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <footer class="footer-area fixed-controls-landscape flex justify-center items-center gap-6 py-2 px-4 shrink-0">
        <button onclick="window.switchCamera()" class="w-14 h-14 md:w-20 md:h-20 bg-slate-800 text-white rounded-xl md:rounded-2xl shadow-xl border-b-4 border-slate-950 flex items-center justify-center text-2xl active:translate-y-1 active:border-b-0">🔄</button>
        <button onclick="window.startCountdown()" class="w-14 h-14 md:w-48 md:h-20 bg-purple-600 text-white font-black rounded-xl md:rounded-2xl shadow-xl border-b-4 border-purple-950 flex items-center justify-center text-2xl active:translate-y-1 active:border-b-0">✨</button>
    </footer>

    <div id="preview-overlay" class="hidden fixed inset-0 z-[200] bg-black/95 backdrop-blur-md flex flex-col items-center justify-center p-4">
        <div class="relative max-w-4xl w-full aspect-video border-4 border-white rounded-2xl overflow-hidden shadow-2xl">
            <img id="preview-img-display" class="w-full h-full object-contain" src="">
        </div>
        <div class="flex flex-wrap justify-center gap-4 mt-6 w-full max-w-2xl">
            <button onclick="window.closePreview()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold min-w-[100px]">ZURÜCK</button>
            <button onclick="window.saveFromPreview()" class="flex-1 bg-purple-600 py-3 rounded-xl font-bold min-w-[100px]">SPEICHERN</button>
            <button onclick="window.printFromPreview(this)" class="flex-1 bg-white text-black py-3 rounded-xl font-bold min-w-[100px]">DRUCKEN</button>
        </div>
    </div>

    <div id="countdown-overlay" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/20 pointer-events-none">
        <div id="countdown-text" class="text-[12rem] font-black text-white drop-shadow-2xl">3</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        let currentStream, currentFacingMode = 'user', activeBg = 'space', isRunning = false;

        const bgs = {
            space: new Image(), jungle: new Image(), underwater: new Image(),
            paris: new Image(), wolken: new Image(), schloss: new Image(),
            dino: new Image(), stadion: new Image()
        };
        bgs.space.src = '../assets/weltraum.jpg'; bgs.jungle.src = '../assets/dschungel.jpg';
        bgs.underwater.src = '../assets/unterwasser.jpg'; bgs.paris.src = '../assets/paris.jpg';
        bgs.wolken.src = '../assets/wolken.jpg'; bgs.schloss.src = '../assets/schloss.jpg';
        bgs.dino.src = '../assets/dino.jpg'; bgs.stadion.src = '../assets/stadion.jpg';

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);

        // --- ROBUSTE KAMERA ---
        async function initCam() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            
            const constraints = [
                { video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } } },
                { video: true }
            ];

            for (let c of constraints) {
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia(c);
                    video.srcObject = currentStream;
                    
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => resolve();
                    });
                    
                    await video.play();
                    isRunning = true;
                    renderLoop();
                    return;
                } catch (e) { console.warn("Versuch fehlgeschlagen", e); }
            }
            alert("Kamera nicht gefunden!");
        }

        async function renderLoop() {
            if (isRunning && video.readyState >= 2 && video.videoWidth > 0) {
                try {
                    await selfieSegmentation.send({image: video});
                } catch (e) {
                    console.error("MediaPipe Processing Fehler:", e);
                }
            }
            if (isRunning) requestAnimationFrame(renderLoop);
        }

        function onResults(results) {
            loadingEl.style.display = 'none';
            canvas.width = results.image.width; canvas.height = results.image.height;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentFacingMode === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-atop';
            const img = bgs[activeBg];
            if (img && img.complete) {
                const cRatio = canvas.width / canvas.height, iRatio = img.width / img.height;
                let dW = canvas.width, dH = canvas.height, dX = 0, dY = 0;
                if (iRatio > cRatio) { dW = canvas.height * iRatio; dX = (canvas.width - dW) / 2; } else { dH = canvas.width / iRatio; dY = (canvas.height - dH) / 2; }
                ctx.drawImage(img, dX, dY, dW, dH);
            } else {
                ctx.fillStyle = "#0f172a"; ctx.fillRect(0,0,canvas.width, canvas.height);
            }
            ctx.restore();
        }

        // --- AKTIONEN ---
        window.startCountdown = () => {
            if(window.playSound) window.playSound('click');
            const overlay = document.getElementById('countdown-overlay');
            const text = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            let count = 3;
            text.innerText = count;
            const timer = setInterval(() => {
                count--;
                if(count > 0) {
                    text.innerText = count;
                    if(window.playSound) window.playSound('click');
                } else {
                    clearInterval(timer);
                    overlay.classList.add('hidden');
                    window.capturePhoto();
                }
            }, 800);
        };

        window.capturePhoto = () => {
            if(window.playSound) window.playSound('shutter');
            isRunning = false;
            document.getElementById('preview-img-display').src = canvas.toDataURL('image/png');
            document.getElementById('preview-overlay').classList.remove('hidden');
        };

        window.closePreview = () => {
            document.getElementById('preview-overlay').classList.add('hidden');
            isRunning = true; renderLoop();
        };

        window.saveFromPreview = () => {
            if(window.playSound) window.playSound('success');
            const a = document.createElement('a');
            a.href = document.getElementById('preview-img-display').src;
            a.download = 'magic_selfie.png'; a.click();
        };

        window.printFromPreview = (btn) => {
            if(window.playSound) window.playSound('click');
            if(window.printImage) window.printImage(document.getElementById('preview-img-display').src, 'Selfie', btn);
        };

        window.setBg = (bg) => { activeBg = bg; if(window.playSound) window.playSound('click'); };
        window.switchCamera = () => { currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user'; initCam(); };
        window.goHome = () => window.location.href = '../index.html';
        window.toggleInfo = () => alert("Hintergrund wählen und lila Button drücken!");

        window.addEventListener('load', () => setTimeout(initCam, 800));
    </script>
</body>
</html>
