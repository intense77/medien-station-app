<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        /* Das ist entscheidend: Das Canvas muss sichtbar sein! */
        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #stage-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3.5rem !important; margin-bottom: 0 !important; }
            .bg-selector { width: 5rem !important; }
        }
    </style>
</head>
<body class="p-2 md:p-4 box-border bg-slate-900">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="hidden md:block absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 text-2xl lg:text-4xl font-black text-purple-400 tracking-widest drop-shadow-lg pointer-events-none z-10 uppercase">
            Magic Booth
        </h1>

        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="flex-1 flex flex-col md:flex-row landscape:flex-row gap-2 md:gap-4 min-h-0 w-full max-w-[95rem] mx-auto overflow-hidden">
        
        <div class="bg-selector flex-none flex flex-row landscape:flex-col gap-2 overflow-x-auto p-1 no-scrollbar">
            <button onclick="window.setBg('space')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-indigo-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🚀</button>
            <button onclick="window.setBg('jungle')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-emerald-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🌴</button>
            <button onclick="window.setBg('underwater')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-blue-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🐙</button>
            <button onclick="window.setBg('paris')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-pink-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🗼</button>
            <button onclick="window.setBg('wolken')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-sky-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">☁️</button>
            <button onclick="window.setBg('schloss')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-purple-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🏰</button>
            <button onclick="window.setBg('dino')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-orange-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🦖</button>
            <button onclick="window.setBg('stadion')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-green-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">⚽</button>
        </div>

        <div class="flex-1 bg-black rounded-[1.5rem] md:rounded-[2.5rem] border-4 md:border-[8px] border-slate-700 shadow-2xl relative overflow-hidden">
            <div id="stage-container">
                <video id="video" autoplay playsinline muted class="hidden"></video>
                <canvas id="output_canvas"></canvas>
            </div>

            <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-40">
                <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-black text-purple-400 animate-pulse text-xs uppercase">Initialisiere Kamera...</p>
            </div>
        </div>

        <div class="flex flex-row md:flex-col landscape:flex-col gap-3 justify-center items-center py-2">
            <button onclick="window.switchCamera()" class="w-14 h-14 md:w-24 md:h-24 bg-slate-800 text-white rounded-2xl border-b-4 md:border-b-8 border-slate-900 active:translate-y-1 active:border-b-0 flex items-center justify-center text-2xl md:text-5xl shadow-xl">🔄</button>
            <button onclick="window.capturePhoto()" class="w-14 h-14 md:w-24 md:h-24 bg-purple-600 text-white rounded-2xl border-b-4 md:border-b-8 border-purple-900 active:translate-y-1 active:border-b-0 flex items-center justify-center text-2xl md:text-5xl shadow-xl">📸</button>
        </div>
    </div>

    <!-- VORSCHAU OVERLAY -->
    <div id="preview-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4 md:p-8 pb-6 md:pb-10">
        <h2 class="flex-none text-2xl md:text-4xl font-black text-white mb-4 md:mb-6 animate-bounce">Dein magisches Foto!</h2>
        <div class="relative w-full max-w-[95%] lg:max-w-[80%] max-h-[55vh] md:max-h-[65vh] flex-1 min-h-0 border-4 md:border-8 border-white shadow-2xl rounded-xl md:rounded-3xl overflow-hidden bg-black flex items-center justify-center">
            <img id="preview-img-display" class="w-full h-full object-contain" src="">
        </div>
        <div class="flex-none flex flex-wrap justify-center gap-2 md:gap-6 mt-4 md:mt-8 w-full max-w-3xl px-1">
            <button onclick="window.closePreview()" class="flex-1 min-w-[100px] md:min-w-[150px] bg-yellow-500 hover:bg-yellow-400 text-black font-black py-3 md:py-5 px-2 md:px-8 rounded-xl md:rounded-2xl text-xs md:text-2xl shadow-xl active:scale-95 transition border-b-4 md:border-b-[8px] border-yellow-700 active:border-b-0 active:translate-y-1 md:active:translate-y-2 flex justify-center items-center gap-1 md:gap-2">🔄 NOCHMAL</button>
            <button onclick="window.saveFromPreview()" class="flex-1 min-w-[100px] md:min-w-[150px] bg-violet-600 text-white font-black py-3 md:py-5 px-2 md:px-8 rounded-xl md:rounded-2xl text-xs md:text-2xl shadow-xl hover:bg-violet-500 active:scale-95 transition border-b-4 md:border-b-[8px] border-violet-800 active:border-b-0 active:translate-y-1 md:active:translate-y-2 flex justify-center items-center gap-1 md:gap-2">💾 SPEICHERN</button>
            <button onclick="window.printFromPreview(this)" class="flex-1 min-w-[100px] md:min-w-[150px] bg-white text-slate-900 font-black py-3 md:py-5 px-2 md:px-8 rounded-xl md:rounded-2xl text-xs md:text-2xl shadow-xl hover:bg-gray-100 active:scale-95 transition border-b-4 md:border-b-[8px] border-gray-400 active:border-b-0 active:translate-y-1 md:active:translate-y-2 flex justify-center items-center gap-1 md:gap-2">🖨️ DRUCKEN</button>
        </div>
    </div>

    <!-- COUNTDOWN OVERLAY -->
    <div id="countdown-overlay" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/30 backdrop-blur-sm">
        <div id="countdown-text" class="text-[10rem] md:text-[15rem] font-black text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)]">3</div>
    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-violet-500 rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo()" class="absolute top-6 right-6 text-white hover:text-violet-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-3xl md:text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4">
                <span>✨ ANLEITUNG</span>
                <button onclick="window.speakText('Anleitung für das Zauber Selfie. Erstens: Wähle links einen Hintergrund. Zweitens: Die Kamera schneidet dich automatisch aus. Drittens: Drücke FOTO für eine Vorschau. Viertens: Dann kannst du Drucken oder es nochmal probieren.', event)" class="ml-auto mr-12 md:mr-16 bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 md:w-14 md:h-14 flex items-center justify-center shadow-lg border-2 border-slate-500 active:scale-95 transition-all text-xl md:text-3xl shrink-0" title="Vorlesen">🔊</button>
            </h2>
            <div class="text-lg text-slate-300 space-y-4">
                <p>1. Wähle links einen <b>Hintergrund</b>.</p>
                <p>2. Die Kamera schneidet dich automatisch aus.</p>
                <p>3. Drücke <b>FOTO</b> für eine Vorschau.</p>
                <p>4. Dann kannst du <b>Speichern</b>, <b>Drucken</b> oder es nochmal probieren.</p>
            </div>
            <button onclick="window.toggleInfo()" class="mt-8 w-full bg-violet-600 hover:bg-violet-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        
        let currentStream;
        let currentFacingMode = 'user';
        let activeBg = 'space';

        // 1. Bilder vorladen
        const bgs = {
            space: new Image(),
            jungle: new Image(),
            underwater: new Image(),
            paris: new Image(),
            wolken: new Image(),
            schloss: new Image(),
            dino: new Image(),
            stadion: new Image()
        };
        bgs.space.src = '../assets/weltraum.jpg';
        bgs.jungle.src = '../assets/dschungel.jpg';
        bgs.underwater.src = '../assets/unterwasser.jpg';
        bgs.paris.src = '../assets/paris.jpg';
        bgs.wolken.src = '../assets/wolken.jpg';
        bgs.schloss.src = '../assets/schloss.jpg';
        bgs.dino.src = '../assets/dino.jpg';
        bgs.stadion.src = '../assets/stadion.jpg';

        // 2. KI Modell initialisieren
        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults(onResults);
        let isRunning = false;

        // 3. Robuste Kamera-Initialisierung
        async function initCam() {
            console.log("Starte Magic Cam...");
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }

            try {
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: {ideal: 1280}, height: {ideal: 720}, facingMode: {ideal: currentFacingMode} }
                    });
                } catch(e) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                currentStream = stream;
                video.srcObject = currentStream;
                
                await video.play().catch(e => console.warn(e));
                isRunning = true;
                renderLoop();
            } catch (err) {
                console.error("Kamera-Fehler:", err);
                if(window.showError) window.showError("Die Kamera ist noch versteckt! Bitte sag einem Erwachsenen Bescheid.", "📷");
            }
        }

        // 4. Schleife, um Video-Frames an die KI zu senden
        async function renderLoop() {
            if (!isRunning) return;
            if (video.readyState >= 2) {
                await selfieSegmentation.send({image: video});
            }
            requestAnimationFrame(renderLoop);
        }

        // 5. Ergebnis von der KI auf das Canvas zeichnen
        function onResults(results) {
            loadingEl.style.display = 'none';
            
            canvas.width = results.image.width;
            canvas.height = results.image.height;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentFacingMode === 'user') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            // Maske zeichnen
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            
            // Person in die Maske zeichnen
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            // Hintergrund HINTER die Person zeichnen
            ctx.globalCompositeOperation = 'destination-atop';
            if (bgs[activeBg] && bgs[activeBg].complete) {
                const img = bgs[activeBg];
                const cRatio = canvas.width / canvas.height;
                const iRatio = img.width / img.height;
                let dW = canvas.width, dH = canvas.height, dX = 0, dY = 0;
                if (iRatio > cRatio) { dW = canvas.height * iRatio; dX = (canvas.width - dW) / 2; } 
                else { dH = canvas.width / iRatio; dY = (canvas.height - dH) / 2; }
                ctx.drawImage(img, dX, dY, dW, dH);
            } else {
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            ctx.restore();
        }

        window.switchCamera = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCam();
        };

        window.setBg = (bg) => { activeBg = bg; if(window.playSound) window.playSound('click'); };

        let isCountingDown = false;
        window.startCountdown = () => {
            if (isCountingDown) return;
            isCountingDown = true;
            if(window.playSound) window.playSound('click');
            
            const overlay = document.getElementById('countdown-overlay');
            const textEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            
            let count = 3;
            const tick = () => {
                textEl.innerText = count;
                textEl.classList.remove('animate-bounce');
                void textEl.offsetWidth; 
                textEl.classList.add('animate-bounce');
                
                if (count === 0) {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                    isCountingDown = false;
                    window.capturePhoto();
                } else {
                    if (count < 3 && window.playSound) window.playSound('click');
                    count--;
                    setTimeout(tick, 1000);
                }
            };
            tick();
        };

        window.capturePhoto = () => {
            if(window.playSound) window.playSound('shutter');
            isRunning = false; // KI Pause
            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('preview-img-display').src = dataUrl;
            const overlay = document.getElementById('preview-overlay');
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
        };

        window.closePreview = () => {
            if(window.playSound) window.playSound('click');
            const overlay = document.getElementById('preview-overlay');
            overlay.classList.add('hidden');
            overlay.style.display = 'none';
            isRunning = true;
            renderLoop(); // KI weiterlaufen lassen
        };

        window.saveFromPreview = () => {
            if(window.playSound) window.playSound('success');
            const dataUrl = document.getElementById('preview-img-display').src;
            const link = document.createElement('a'); 
            link.download = 'zauber_selfie.png'; 
            link.href = dataUrl; 
            link.click();
        };

        window.printFromPreview = (btn) => {
            if(window.playSound) window.playSound('click');
            const dataUrl = document.getElementById('preview-img-display').src;
            if (window.printImage) window.printImage(dataUrl, 'Zauber-Selfie', btn);
        };

        // Start mit Verzögerung gegen Cordova-Crash
        window.addEventListener('load', () => setTimeout(initCam, 800));
    </script>
</body>
</html>
