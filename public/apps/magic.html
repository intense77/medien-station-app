<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Magic Booth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>
    <script src="../js/camera_utils.js"></script>
    <script src="../js/selfie_segmentation.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Container für das KI-Vorschaubild */
        #stage-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Smartphone Landscape Optimierung */
        @media (max-height: 500px) and (orientation: landscape) {
            .header-area { height: 3.5rem !important; margin-bottom: 0 !important; }
            .main-layout { flex-direction: row !important; gap: 0.5rem !important; }
            .bg-selector { width: 5rem !important; }
            .action-btn { height: 3.5rem !important; padding: 0 1rem !important; }
            .video-frame { border-width: 4px !important; }
        }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container { position: fixed; left: 0; top: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; }
        }
    </style>
</head>
<body class="p-2 md:p-4 box-border bg-slate-900">

    <div class="header-area h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="hidden md:block absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 text-2xl lg:text-4xl font-black text-purple-400 tracking-widest drop-shadow-lg pointer-events-none z-10 uppercase">
            Magic Booth
        </h1>

        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="main-layout flex-1 flex flex-col gap-2 md:gap-4 min-h-0 w-full max-w-[95rem] mx-auto overflow-hidden">
        
        <div class="bg-selector flex-none flex flex-row landscape:flex-col gap-2 overflow-x-auto no-scrollbar p-1">
            <button onclick="window.setBg('space')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-indigo-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🚀</button>
            <button onclick="window.setBg('jungle')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-emerald-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🌴</button>
            <button onclick="window.setBg('underwater')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-blue-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">🐙</button>
            <button onclick="window.setBg('disco')" class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-pink-900 border-2 border-white flex-none flex items-center justify-center text-2xl md:text-4xl shadow-lg active:scale-90">💃</button>
        </div>

        <div id="stage-frame" class="video-frame flex-1 bg-black rounded-[1.5rem] md:rounded-[2.5rem] border-4 md:border-[8px] border-slate-700 shadow-2xl relative overflow-hidden flex items-center justify-center">
            
            <div id="stage-container">
                <video id="video" autoplay playsinline muted class="hidden"></video>
                <canvas id="output_canvas"></canvas>
            </div>

            <div id="loading-ai" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-40">
                <div class="w-12 h-12 md:w-16 md:h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-black text-purple-400 animate-pulse text-sm md:text-xl uppercase">Lade Zauberkraft...</p>
            </div>
        </div>

        <div class="flex-none flex justify-center gap-3 md:gap-6 py-2">
            <button onclick="window.switchCamera()" class="action-btn w-14 h-14 md:w-24 md:h-24 bg-slate-800 text-white rounded-2xl border-b-4 md:border-b-8 border-slate-900 active:translate-y-1 active:border-b-0 flex items-center justify-center text-2xl md:text-5xl shadow-xl">🔄</button>
            
            <button onclick="window.capturePhoto()" class="action-btn flex-1 max-w-sm bg-purple-600 text-white font-black py-3 md:py-6 rounded-2xl border-b-4 md:border-b-8 border-purple-900 active:translate-y-1 active:border-b-0 text-lg md:text-4xl shadow-xl flex items-center justify-center gap-3">
                📸 SELFIE!
            </button>
        </div>
    </div>

    <div id="preview-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-4">
        <h2 class="text-2xl md:text-5xl font-black text-purple-400 mb-4 uppercase italic">Magisches Resultat!</h2>
        <div class="relative w-full max-w-4xl aspect-video border-4 md:border-8 border-white shadow-2xl rounded-2xl overflow-hidden bg-black">
            <img id="preview-img-display" class="w-full h-full object-contain" src="">
        </div>
        <div class="flex gap-4 md:gap-8 mt-6 w-full max-w-4xl">
            <button onclick="window.closePreview()" class="flex-1 bg-slate-700 text-white font-black py-4 rounded-2xl text-sm md:text-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0 uppercase">Zurück</button>
            <button onclick="window.saveFromPreview()" class="flex-1 bg-purple-600 text-white font-black py-4 rounded-2xl text-sm md:text-2xl border-b-4 border-purple-900 active:translate-y-1 active:border-b-0 uppercase">Speichern</button>
            <button onclick="window.printFromPreview(this)" class="flex-1 bg-white text-black font-black py-4 rounded-2xl text-sm md:text-2xl border-b-4 border-gray-300 active:translate-y-1 active:border-b-0 uppercase">Drucken</button>
        </div>
    </div>

    <div id="print-container" class="hidden"><img id="print-img" src=""></div>

    <script>
        // Logik zur Initialisierung und KI-Steuerung
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-ai');
        
        let currentStream;
        let currentFacingMode = 'user';
        let activeBg = 'space';

        // Hintergründe (Beispiel-Emojis oder Farben als Platzhalter)
        const bgData = {
            space: '#020617',
            jungle: '#064e3b',
            underwater: '#0c4a6e',
            disco: '#4c0519'
        };

        async function initCam() {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: currentFacingMode }
                });
                video.srcObject = currentStream;
                video.onloadedmetadata = () => {
                    video.play();
                    startAiProcess();
                };
            } catch (err) {
                console.error("Cam Error", err);
                loadingEl.innerText = "Kamera-Fehler!";
            }
        }

        window.setBg = (bg) => {
            if(window.playSound) window.playSound('click');
            activeBg = bg;
        };

        window.capturePhoto = () => {
            if(window.playSound) window.playSound('shutter');
            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('preview-img-display').src = dataUrl;
            document.getElementById('preview-overlay').classList.remove('hidden');
            document.getElementById('preview-overlay').style.display = 'flex';
        };

        window.closePreview = () => {
            document.getElementById('preview-overlay').classList.add('hidden');
            document.getElementById('preview-overlay').style.display = 'none';
        };

        window.saveFromPreview = () => {
            if(window.playSound) window.playSound('success');
            const link = document.createElement('a');
            link.download = 'magic-selfie.png';
            link.href = document.getElementById('preview-img-display').src;
            link.click();
        };

        window.switchCamera = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCam();
        };

        window.goHome = () => window.location.href = '../index.html';
        window.toggleInfo = () => alert("Wähle einen Hintergrund und mach ein magisches Selfie!");

        // Simulierter KI Prozess (Hier müsste deine selfie_segmentation.js Logik einhaken)
        function startAiProcess() {
            loadingEl.style.display = 'none';
            function loop() {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                // Hintergrund zeichnen
                ctx.fillStyle = bgData[activeBg];
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Video zeichnen (als Fallback für KI-Vorschau)
                ctx.save();
                if(currentFacingMode === 'user') {
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                }
                ctx.globalAlpha = 0.8; // Zeige, dass die KI aktiv ist
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
                
                requestAnimationFrame(loop);
            }
            loop();
        }

        window.onload = initCam;
    </script>
</body>
</html>
