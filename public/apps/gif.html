<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Loop Cam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../assets/logo.png">
    
    <!-- iOS Meta Tags -->
    <link rel="apple-touch-icon" href="../assets/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="../js/tailwind.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>

    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; user-select: none; touch-action: manipulation; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
        
        /* Video und Canvas sollen Block-Elemente sein (verhindert weiße Linien unten) */
        video, canvas { display: block; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Countdown Animation */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .font-comic { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 box-border bg-slate-900 overflow-hidden h-[100dvh] w-screen" 
      onclick="window.resetIdleTimer()" ontouchstart="window.resetIdleTimer()">

    <!-- HEADER ZEILE -->
    <div class="h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 md:mb-4 px-1 relative">
        <button onclick="goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <!-- Titel (nur Desktop/Tablet) -->
        <h1 class="hidden md:block absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 text-2xl lg:text-5xl font-black text-sky-500 tracking-wider drop-shadow-lg pointer-events-none z-10">
            VIDEO LOOP
        </h1>

        <button onclick="toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <!-- MAIN BEREICH (3 Spalten auf Tablet, vertikal auf Mobile) -->
    <div class="flex-1 flex flex-col md:flex-row gap-2 md:gap-4 min-h-0 min-w-0 items-center justify-center w-full max-w-[95rem] mx-auto overflow-hidden pb-1">
        
        <!-- 1. SPALTE/ZEILE: Filter -->
        <div class="w-full md:w-32 flex flex-row md:flex-col gap-2 bg-slate-800 p-2 md:p-3 rounded-xl md:rounded-[2rem] border-4 border-slate-700 shadow-2xl shrink-0 md:h-full max-h-full overflow-x-auto md:overflow-y-auto no-scrollbar items-center justify-start md:justify-start">
            <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest text-center w-full shrink-0 hidden md:block mb-2">Filter</div>
            
            <div class="flex flex-row md:flex-col gap-2 md:gap-4 w-max md:w-full items-center">
                <button onclick="window.setFilter('')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow">
                <span class="text-xl md:text-2xl mb-1">⚪</span> NORM
            </button>
                <button onclick="window.setFilter('grayscale(100%) contrast(1.2)')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow" style="filter: grayscale(100%)">
                <span class="text-xl md:text-2xl mb-1">⚫</span> S/W
            </button>
                <button onclick="window.setFilter('sepia(80%)')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow" style="filter: sepia(80%)">
                <span class="text-xl md:text-2xl mb-1">📜</span> ALT
            </button>
                <button onclick="window.setFilter('invert(100%)')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow" style="filter: invert(100%)">
                <span class="text-xl md:text-2xl mb-1">💀</span> XRAY
            </button>
                <button onclick="window.setFilter('saturate(250%)')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow" style="filter: saturate(250%)">
                <span class="text-xl md:text-2xl mb-1">🎨</span> POP
            </button>
                <button onclick="window.setFilter('hue-rotate(90deg)')" class="w-16 h-14 md:w-full md:h-20 shrink-0 rounded-xl bg-slate-700 text-white font-black text-[10px] md:text-xs hover:bg-slate-600 active:scale-95 transition flex flex-col items-center justify-center shadow" style="filter: hue-rotate(90deg)">
                <span class="text-xl md:text-2xl mb-1">👽</span> ALIEN
            </button>
            </div>
        </div>

        <!-- 2. MITTLERE SPALTE: Video & Action -->
        <div class="flex-1 flex flex-col items-center h-full min-w-0 min-h-0 w-full gap-2 md:gap-4 overflow-hidden relative">
            <div id="video-container" class="relative flex-1 w-full h-full bg-slate-800 rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border-4 md:border-[8px] border-slate-700 shadow-2xl flex items-center justify-center min-h-0 group transition-colors duration-300">
                <video id="video" autoplay playsinline muted class="w-full h-full object-contain"></video>
                <canvas id="canvas" class="w-full h-full object-contain hidden"></canvas>
                
                <div id="countdown-overlay" class="absolute inset-0 flex items-center justify-center hidden bg-black/50 backdrop-blur-sm z-30">
                    <div id="countdown-text" class="text-[8rem] md:text-[12rem] font-black text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] font-comic">3</div>
                </div>
                
                <div id="rec-indicator" class="absolute top-4 right-4 hidden items-center gap-2 z-30 bg-red-600 text-white px-3 py-1 md:px-4 md:py-2 rounded-full font-black text-sm md:text-lg animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.8)]">
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div> REC
                </div>

                <div id="saving-overlay" class="absolute inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center text-white">
                    <div class="text-6xl animate-spin mb-4">💾</div>
                    <div class="text-2xl font-bold">Speichere...</div>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="h-16 md:h-24 w-full flex-shrink-0 flex items-center justify-center relative px-2">
                <div id="start-overlay" class="absolute w-full flex justify-center items-center gap-3 md:gap-4 z-20 pointer-events-none">
                    <button onclick="window.switchCamera()" id="switch-btn" class="pointer-events-auto w-14 h-14 md:w-20 md:h-20 bg-slate-700 hover:bg-slate-600 text-white rounded-xl md:rounded-2xl shadow-xl border-b-4 md:border-b-[8px] border-slate-900 active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center shrink-0" title="Kamera wechseln">
                        <span class="text-2xl md:text-3xl">🔄</span>
                    </button>
                    <button onclick="window.startCountdown()" class="pointer-events-auto bg-sky-500 hover:bg-sky-400 text-white text-xl md:text-4xl font-black py-3 md:py-6 px-6 md:px-16 rounded-xl md:rounded-2xl shadow-2xl border-b-4 md:border-b-[8px] border-sky-700 active:border-b-0 active:translate-y-2 transition-all w-full max-w-[250px] md:max-w-xs flex items-center justify-center gap-2">
                        <span>🎥</span> ACTION!
                    </button>
                </div>
                
                <div id="action-buttons" class="hidden gap-2 md:gap-4 w-full justify-center z-20 pointer-events-none px-2">
                    <button onclick="window.resetApp()" class="pointer-events-auto bg-yellow-500 hover:bg-yellow-400 text-black text-sm md:text-2xl font-black py-3 md:py-4 px-3 md:px-6 rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-yellow-700 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-center gap-1 md:gap-2 flex-1 max-w-[180px]">
                        🔄 NOCHMAL
                    </button>
                    <button onclick="window.saveLoopVideo()" class="pointer-events-auto bg-green-600 hover:bg-green-500 text-white text-sm md:text-2xl font-black py-3 md:py-4 px-3 md:px-6 rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-green-800 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-center gap-1 md:gap-2 flex-1 max-w-[180px]">
                        💾 SPEICHERN
                    </button>
                </div>
            </div>
        </div>

        <!-- SPEED -->
        <div id="speed-controls" class="w-full md:w-32 flex flex-row md:flex-col gap-2 bg-slate-800 p-2 md:p-3 rounded-xl md:rounded-[2rem] border-4 border-slate-700 shadow-2xl shrink-0 md:h-full max-h-full overflow-x-auto md:overflow-y-auto no-scrollbar items-center justify-start md:justify-start opacity-30 pointer-events-none transition-opacity duration-300">
            <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest text-center w-full shrink-0 hidden md:block mb-2">Tempo</div>
            <div class="flex flex-row md:flex-col gap-2 md:gap-4 w-max md:w-full items-center">
                <button id="btn-slow" onclick="window.setSpeed(150)" class="w-24 md:w-full h-14 md:h-24 bg-slate-700 text-white rounded-xl shadow border-2 border-transparent transition active:scale-95 flex flex-col items-center justify-center gap-1 opacity-50 hover:bg-slate-600">
                <span class="text-xl md:text-3xl">🐢</span><span class="text-[10px] font-black uppercase">Langsam</span>
            </button>
                <button id="btn-norm" onclick="window.setSpeed(40)" class="w-24 md:w-full h-14 md:h-24 bg-slate-700 text-white rounded-xl shadow border-2 border-transparent transition active:scale-95 flex flex-col items-center justify-center gap-1 opacity-50 hover:bg-slate-600">
                <span class="text-xl md:text-3xl">🚶</span><span class="text-[10px] font-black uppercase">Mittel</span>
            </button>
                <button id="btn-turbo" onclick="window.setSpeed(10)" class="w-24 md:w-full h-14 md:h-24 bg-slate-700 text-white rounded-xl shadow border-2 border-transparent transition active:scale-95 flex flex-col items-center justify-center gap-1 opacity-50 hover:bg-slate-600">
                <span class="text-xl md:text-3xl">🚀</span><span class="text-[10px] font-black uppercase">Turbo</span>
            </button>
            </div>
        </div>
    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-sky-500 rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo(); window.playSound('click')" class="absolute top-6 right-6 text-white hover:text-sky-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4"><span class="text-6xl">📹</span> ANLEITUNG</h2>
            <div class="text-lg text-slate-300 space-y-4">
                <p>1. Wähle links einen <b>Filter</b>.</p>
                <p>2. Drücke unten auf <b>ACTION!</b>.</p>
                <p>3. Nach der Aufnahme kannst du rechts das <b>Tempo</b> ändern.</p>
                <p>4. Mit <b>🔄</b> wechselst du die Kamera.</p>
            </div>
            <button onclick="window.toggleInfo()" class="mt-8 w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <script>
        let video, canvas, ctx, videoContainer, recIndicator, startBtn, resultBtns, speedWrapper, switchBtn;
        let frames = [];
        let speed = 40;
        let loopInterval;
        let currentStream;
        let currentFacingMode = 'user';

        window.onload = () => {
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            videoContainer = document.getElementById('video-container');
            recIndicator = document.getElementById('rec-indicator');
            startBtn = document.getElementById('start-overlay');
            resultBtns = document.getElementById('action-buttons');
            speedWrapper = document.getElementById('speed-controls');
            switchBtn = document.getElementById('switch-btn');
            
            initCam();
        };

        async function initCam() {
            if (!video) return;
            try {
                if (currentStream && typeof currentStream.getTracks === 'function') {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: {ideal: 1280}, height: {ideal: 720}, facingMode: currentFacingMode }
                });
                currentStream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); };
                video.style.transform = (currentFacingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
            } catch (err) {
                console.error("Kamera-Fehler: " + err.message);
            }
        }

        window.switchCamera = function() {
            if(window.playSound) window.playSound('click');
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            initCam();
        }

        window.setFilter = function(filterStr) {
            if(window.playSound) window.playSound('click');
            if(video) video.style.filter = filterStr;
            if(canvas) canvas.style.filter = filterStr;
        }

        window.startCountdown = function() {
            if(window.playSound) window.playSound('click');
            startBtn.classList.add('hidden');
            switchBtn.classList.add('hidden');
            
            const overlay = document.getElementById('countdown-overlay');
            const textEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            overlay.style.display = 'flex';
            
            let count = 3;
            const tick = () => {
                textEl.innerText = count;
                textEl.classList.remove('animate-pop');
                void textEl.offsetWidth; // trigger reflow
                textEl.classList.add('animate-pop');
                if(window.playSound) window.playSound('click');
                
                if (count === 0) {
                    overlay.classList.add('hidden');
                    overlay.style.display = 'none';
                    if(window.playSound) window.playSound('shutter');
                    record();
                } else {
                    count--;
                    setTimeout(tick, 1000);
                }
            };
            tick();
        }

        function record() {
            frames = [];
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            videoContainer.classList.remove('border-slate-700');
            videoContainer.classList.add('border-red-600');
            recIndicator.classList.remove('hidden');
            recIndicator.style.display = 'flex';
            
            let startTime = Date.now();
            
            function captureLoop() {
                if (Date.now() - startTime < 2000) {
                    ctx.save();
                    if (currentFacingMode === 'user') {
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                    frames.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                    requestAnimationFrame(captureLoop);
                } else {
                    play();
                }
            }
            captureLoop();
        }

        function play() {
            videoContainer.classList.remove('border-red-600');
            videoContainer.classList.add('border-slate-700');
            recIndicator.classList.add('hidden');
            recIndicator.style.display = '';

            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            
            resultBtns.classList.remove('hidden');
            resultBtns.style.display = 'flex';

            speedWrapper.classList.remove('opacity-30', 'pointer-events-none');
            window.setSpeed(40);

            const loopFrames = [...frames, ...[...frames].reverse()];
            startLoop(loopFrames, 0);
        }

        function startLoop(loopFrames, i) {
            clearInterval(loopInterval);
            loopInterval = setInterval(() => {
                if (loopFrames[i]) ctx.putImageData(loopFrames[i], 0, 0);
                i = (i + 1) % loopFrames.length;
            }, speed);
        }

        window.setSpeed = function(ms) {
            if(window.playSound) window.playSound('click');
            speed = ms;
            updateSpeedUI();
            if (canvas && !canvas.classList.contains('hidden')) {
                const loopFrames = [...frames, ...[...frames].reverse()];
                startLoop(loopFrames, 0);
            }
        }
        
        function updateSpeedUI() {
            const btns = {
                150: document.getElementById('btn-slow'),
                40: document.getElementById('btn-norm'), 
                10: document.getElementById('btn-turbo') 
            };

            Object.values(btns).forEach(btn => {
                if(btn) {
                    btn.classList.remove('opacity-100', 'border-white', 'bg-sky-600');
                    btn.classList.add('opacity-50', 'border-transparent', 'bg-slate-700');
                }
            });

            const active = btns[speed];
            if(active) {
                active.classList.remove('opacity-50', 'border-transparent', 'bg-slate-700');
                active.classList.add('opacity-100', 'border-white', 'bg-sky-600');
            }
        }

        window.saveLoopVideo = function() {
            if(window.playSound) window.playSound('success');
            document.getElementById('saving-overlay').classList.remove('hidden');
            document.getElementById('saving-overlay').style.display = 'flex';
            
            let mime = 'video/webm';
            if (!MediaRecorder.isTypeSupported(mime)) {
                mime = 'video/mp4'; // fallback for Safari/iOS
            }
            
            try {
                const stream = canvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: mime });
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mime });
                    const url = URL.createObjectURL(blob);

                    if (navigator.share) {
                        const file = new File([blob], 'loop.mp4', { type: mime });
                        navigator.share({
                            files: [file],
                            title: 'Video Loop',
                        }).catch(e => {
                            downloadFile(url);
                        });
                    } else {
                        downloadFile(url);
                    }

                    document.getElementById('saving-overlay').classList.add('hidden');
                    document.getElementById('saving-overlay').style.display = '';
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 4000); // 4 seconds recording
            } catch(e) {
                alert("Speichern auf diesem Gerät leider nicht möglich.");
                document.getElementById('saving-overlay').classList.add('hidden');
                document.getElementById('saving-overlay').style.display = '';
            };
        }
        
        function downloadFile(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mein-loop.mp4';
            a.click();
        }

        window.resetApp = function() {
            if(window.playSound) window.playSound('click');
            clearInterval(loopInterval);
            video.classList.remove('hidden');
            canvas.classList.add('hidden');

            startBtn.classList.remove('hidden');
            resultBtns.classList.add('hidden');
            resultBtns.style.display = 'none';

            speedWrapper.classList.add('opacity-30', 'pointer-events-none');
            switchBtn.classList.remove('hidden');

            videoContainer.classList.remove('border-red-600');
            videoContainer.classList.add('border-slate-700');
            recIndicator.classList.add('hidden');
            recIndicator.style.display = '';
            window.setSpeed(40);
        }

        window.toggleInfo = function() {
            if(window.playSound) window.playSound('click');
            const modal = document.getElementById('info-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        window.addEventListener('beforeunload', () => {
            try {
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
            } catch(e) {}
        });
    </script>
</body>
</html>
