<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Loop Cam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="../js/tailwind.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Erzwingt Vollbild ohne Scrollen */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            background-color: #000; color: white; 
            overflow: hidden !important; 
            user-select: none; touch-action: none; 
            overscroll-behavior: none;
        }
        
        /* Video und Canvas sollen Block-Elemente sein (verhindert weiße Linien unten) */
        video, canvas { display: block; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 box-border bg-slate-900 overflow-hidden h-[100dvh] w-screen" onclick="resetIdleTimer()" ontouchstart="resetIdleTimer()">

    <div class="h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 px-1">
        <a href="../index.html" class="bg-slate-800 text-white border-4 border-slate-600 hover:border-white px-4 py-2 md:px-6 md:py-3 rounded-full text-base md:text-xl font-black shadow-xl flex items-center gap-2 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </a>
        
        <button onclick="toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0">
            ?
        </button>
    </div>

    <!-- MAIN BEREICH (3 Spalten auf Tablet, 3 Zeilen auf Mobile) -->
    <div class="flex-1 flex flex-col md:flex-row gap-2 md:gap-4 min-h-0 min-w-0 items-center justify-center w-full max-w-[95rem] mx-auto overflow-hidden pb-1">
        
        <!-- 1. SPALTE/ZEILE: Filter -->
        <div class="w-full md:w-32 flex flex-row md:flex-col gap-2 bg-gray-900/50 p-2 rounded-xl md:rounded-2xl border border-white/10 shadow-2xl shrink-0 md:h-full max-h-full overflow-x-auto md:overflow-y-auto no-scrollbar items-center">
            <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest text-center w-full py-1 shrink-0 hidden md:block">Filter</div>
            
            <div class="flex-1 flex flex-row md:flex-col items-center justify-start md:justify-evenly w-max md:w-full gap-2 pb-1 md:pb-0 px-1 md:px-0">
                <button onclick="setFilter('')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-white text-black font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-transparent flex flex-col items-center justify-center shadow-lg">
                    <span>⚪</span> NORM
                </button>
                <button onclick="setFilter('grayscale(100%) contrast(1.2)')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-gray-600 text-white font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-white/20 flex flex-col items-center justify-center shadow-lg" style="filter: grayscale(100%)">
                    <span>⚫</span> S/W
                </button>
                <button onclick="setFilter('sepia(80%)')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-amber-700 text-white font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-white/20 flex flex-col items-center justify-center shadow-lg" style="filter: sepia(80%)">
                    <span>📜</span> ALT
                </button>
                <button onclick="setFilter('invert(100%)')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-blue-600 text-white font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-white/20 flex flex-col items-center justify-center shadow-lg" style="filter: invert(100%)">
                    <span>💀</span> XRAY
                </button>
                <button onclick="setFilter('saturate(250%)')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-pink-500 text-white font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-white/20 flex flex-col items-center justify-center shadow-lg" style="filter: saturate(250%)">
                    <span>🎨</span> POP
                </button>
                <button onclick="setFilter('hue-rotate(90deg)')" class="w-16 h-12 md:w-24 md:h-16 shrink-0 rounded-lg md:rounded-xl bg-emerald-500 text-white font-black text-[10px] md:text-xs hover:scale-105 active:scale-95 transition border-2 md:border-4 border-white/20 flex flex-col items-center justify-center shadow-lg" style="filter: hue-rotate(90deg)">
                    <span>👽</span> ALIEN
                </button>
            </div>
        </div>

        <!-- 2. MITTLERE SPALTE: Video & Action -->
        <div class="flex-1 flex flex-col items-center h-full min-w-0 min-h-0 w-full gap-2 md:gap-4 overflow-hidden">
            
            <!-- Video Container -->
            <div id="video-container" class="relative flex-1 w-full bg-gray-900 rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border-4 md:border-[8px] border-gray-800 shadow-2xl group transition-colors duration-200 flex items-center justify-center min-h-0 min-w-0">
                
                <video id="video" autoplay playsinline muted class="w-full h-full object-contain"></video>
                <canvas id="canvas" class="w-full h-full object-contain hidden"></canvas>
                
                <div id="countdown" class="absolute inset-0 flex items-center justify-center text-[8rem] md:text-[12rem] font-black text-white hidden bg-black/50 backdrop-blur-sm z-30">3</div>
                
                <div id="rec-indicator" class="absolute top-4 right-4 hidden items-center gap-2 z-30 bg-red-600 text-white px-3 py-1 md:px-4 md:py-2 rounded-full font-black text-sm md:text-lg animate-pulse shadow-lg">
                    <div class="w-2 h-2 md:w-3 md:h-3 bg-white rounded-full"></div> REC
                </div>

                <!-- Saving Overlay -->
                <div id="saving-overlay" class="absolute inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center text-white">
                    <div class="text-6xl animate-spin mb-4">💾</div>
                    <div class="text-2xl font-bold">Speichere Loop...</div>
                </div>
            </div>

            <!-- Button Area (Feste Höhe) -->
            <div class="h-16 md:h-24 w-full flex-shrink-0 flex items-center justify-center relative px-2">
                
                <!-- Start Overlay -->
                <div id="start-overlay" class="absolute w-full flex justify-center items-center gap-3 md:gap-4 z-20 pointer-events-none">
                     <!-- Kamera Wechsel Button -->
                     <button onclick="switchCamera()" id="switch-btn" class="pointer-events-auto w-14 h-14 md:w-20 md:h-20 bg-slate-700 hover:bg-slate-600 text-white rounded-xl md:rounded-2xl shadow-xl border-b-4 md:border-b-[8px] border-slate-900 active:border-b-0 active:translate-y-2 transition-all flex items-center justify-center shrink-0" title="Kamera wechseln">
                        <span class="text-2xl md:text-3xl">🔄</span>
                    </button>

                     <!-- Action Button -->
                     <button onclick="startCountdown()" class="pointer-events-auto bg-sky-500 hover:bg-sky-400 text-white text-xl md:text-4xl font-black py-3 md:py-6 px-6 md:px-16 rounded-xl md:rounded-2xl shadow-2xl border-b-4 md:border-b-[8px] border-sky-700 active:border-b-0 active:translate-y-2 transition-all w-full max-w-xs md:max-w-lg flex items-center justify-center gap-2">
                        <span>🎥</span> ACTION!
                    </button>
                </div>
                
                <!-- Reset & Save Buttons -->
                <div id="action-buttons" class="hidden gap-2 md:gap-4 w-full justify-center z-20 pointer-events-none px-2">
                     <button onclick="reset()" class="pointer-events-auto bg-yellow-500 hover:bg-yellow-400 text-black text-sm md:text-2xl font-black py-3 md:py-4 px-3 md:px-6 rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-yellow-700 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-center gap-1 md:gap-2 flex-1 max-w-[180px]">
                        🔄 NOCHMAL
                    </button>
                     <button onclick="saveLoopVideo()" class="pointer-events-auto bg-green-600 hover:bg-green-500 text-white text-sm md:text-2xl font-black py-3 md:py-4 px-3 md:px-6 rounded-xl md:rounded-2xl border-b-4 md:border-b-[8px] border-green-800 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-center gap-1 md:gap-2 flex-1 max-w-[180px]">
                        💾 SPEICHERN
                    </button>
                </div>
            </div>
        </div>

        <!-- 3. RECHTE SPALTE/ZEILE: Speed -->
        <div class="w-full md:w-32 flex flex-row md:flex-col justify-center gap-2 md:gap-3 z-40 bg-gray-900/50 p-2 rounded-xl md:rounded-2xl border border-white/10 shadow-2xl shrink-0 md:h-full max-h-full overflow-x-auto no-scrollbar transition-opacity opacity-30 pointer-events-none items-center" id="speed-controls">
            <div class="text-center text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-widest shrink-0 hidden md:block w-full">Tempo</div>
            
            <div class="flex-1 flex flex-row md:flex-col justify-center items-center gap-2 md:gap-4 w-max md:w-full px-1 md:px-0">
                <button id="btn-slow" onclick="setSpeed(150)" class="w-24 md:w-full h-12 md:h-24 bg-green-700 hover:bg-green-600 text-white rounded-lg md:rounded-xl shadow-lg border-b-2 md:border-b-4 border-green-900 transition active:scale-95 flex flex-row md:flex-col items-center justify-center gap-1 opacity-50">
                    <span class="text-lg md:text-2xl">🐢</span><span class="text-[10px] font-black uppercase hidden md:inline">Langsam</span>
                </button>
                
                <button id="btn-norm" onclick="setSpeed(40)" class="w-24 md:w-full h-12 md:h-24 bg-blue-700 hover:bg-blue-600 text-white rounded-lg md:rounded-xl shadow-lg border-b-2 md:border-b-4 border-blue-900 transition active:scale-95 flex flex-row md:flex-col items-center justify-center gap-1 opacity-50">
                    <span class="text-lg md:text-2xl">🚶</span><span class="text-[10px] font-black uppercase hidden md:inline">Mittel</span>
                </button>
                
                <button id="btn-turbo" onclick="setSpeed(10)" class="w-24 md:w-full h-12 md:h-24 bg-red-700 hover:bg-red-600 text-white rounded-lg md:rounded-xl shadow-lg border-b-2 md:border-b-4 border-red-900 transition active:scale-95 flex flex-row md:flex-col items-center justify-center gap-1 opacity-50">
                    <span class="text-lg md:text-2xl">🚀</span><span class="text-[10px] font-black uppercase hidden md:inline">Turbo</span>
                </button>
            </div>
        </div>

    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="toggleInfo()">
        <div class="bg-slate-800 border-4 border-sky-500 rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="toggleInfo()" class="absolute top-6 right-6 text-white hover:text-sky-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4">
                <span class="text-6xl">📹</span> ANLEITUNG
            </h2>
            <div class="text-lg text-slate-300 space-y-4">
                <p>1. Wähle links einen <b>Filter</b>.</p>
                <p>2. Drücke unten auf <b>ACTION!</b>.</p>
                <p>3. Nach der Aufnahme kannst du rechts das <b>Tempo</b> ändern.</p>
                <p>4. Mit <b>🔄</b> wechselst du die Kamera.</p>
            </div>
            <button onclick="toggleInfo()" class="mt-8 w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <script>
        // --- IDLE TIMER ---
        let idleTimer;
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if (document.getElementById('countdown').classList.contains('hidden') && 
                    document.getElementById('saving-overlay').classList.contains('hidden')) {
                    window.location.href = '../index.html';
                } else {
                    resetIdleTimer();
                }
            }, 120000); // 2 Min
        }
        
        ['mousedown', 'touchstart', 'scroll', 'keydown', 'input'].forEach(evt => 
            document.addEventListener(evt, resetIdleTimer, {passive: true})
        );
        resetIdleTimer();

        // --- INFO MODAL ---
        function toggleInfo() {
            const modal = document.getElementById('info-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const videoContainer = document.getElementById('video-container');
        const recIndicator = document.getElementById('rec-indicator');
        const startBtn = document.getElementById('start-overlay');
        const resultBtns = document.getElementById('action-buttons');
        const speedWrapper = document.getElementById('speed-controls');
        const switchBtn = document.getElementById('switch-btn');
        
        let frames = [];
        let speed = 40; 
        let loopInterval;
        let currentStream;
        let currentFacingMode = 'user'; 

        async function initCam() {
            try {
                if (currentStream) currentStream.getTracks().forEach(track => track.stop());
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: {ideal: 1280}, height: {ideal: 720}, facingMode: currentFacingMode }
                });
                currentStream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); };
                
                // Spiegelung bei Frontkamera
                if (currentFacingMode === 'user') video.style.transform = 'scaleX(-1)';
                else video.style.transform = 'scaleX(1)';
                
            } catch (err) {
                alert("Kamera-Fehler: " + err.message);
            }
        }
        
        function switchCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            initCam();
        }

        initCam();

        function setFilter(filter) {
            video.style.filter = filter;
            canvas.style.filter = filter;
        }

        function startCountdown() {
            startBtn.classList.add('hidden'); 
            switchBtn.classList.add('hidden'); 
            
            const cd = document.getElementById('countdown');
            cd.classList.remove('hidden');
            cd.style.display = 'flex';
            
            let count = 3;
            cd.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    cd.innerText = count;
                } else {
                    clearInterval(timer);
                    cd.style.display = 'none';
                    record();
                }
            }, 800);
        }

        function record() {
            frames = [];
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            videoContainer.classList.remove('border-gray-800');
            videoContainer.classList.add('border-red-600');
            recIndicator.classList.remove('hidden');
            recIndicator.style.display = 'flex';
            
            let startTime = Date.now();
            
            function captureLoop() {
                if (Date.now() - startTime < 2000) {
                    ctx.save();
                    if (currentFacingMode === 'user') {
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                    frames.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
                    requestAnimationFrame(captureLoop);
                } else {
                    play();
                }
            }
            captureLoop();
        }

        function play() {
            videoContainer.classList.remove('border-red-600');
            videoContainer.classList.add('border-gray-800');
            recIndicator.classList.add('hidden');
            recIndicator.style.display = ''; 

            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            
            resultBtns.classList.remove('hidden');
            resultBtns.style.display = 'flex';
            
            speedWrapper.classList.remove('opacity-30', 'pointer-events-none');
            
            setSpeed(40);
            
            const loopFrames = [...frames, ...[...frames].reverse()];
            let i = 0;
            startLoop(loopFrames, i);
        }

        function startLoop(loopFrames, i) {
            clearInterval(loopInterval);
            loopInterval = setInterval(() => {
                ctx.putImageData(loopFrames[i], 0, 0);
                i = (i + 1) % loopFrames.length;
            }, speed);
        }

        function setSpeed(ms) {
            speed = ms;
            updateSpeedUI();
            if (!canvas.classList.contains('hidden')) {
                const loopFrames = [...frames, ...[...frames].reverse()];
                startLoop(loopFrames, 0);
            }
        }
        
        function updateSpeedUI() {
            const btns = {
                150: document.getElementById('btn-slow'),
                40:  document.getElementById('btn-norm'),
                10:  document.getElementById('btn-turbo')
            };
            
            Object.values(btns).forEach(btn => {
                btn.classList.remove('opacity-100', 'scale-105', 'border-white');
                btn.classList.add('opacity-50', 'border-transparent');
            });

            const active = btns[speed];
            if(active) {
                active.classList.remove('opacity-50', 'border-transparent');
                active.classList.add('opacity-100', 'scale-105', 'border-white');
            }
        }

        function saveLoopVideo() {
            document.getElementById('saving-overlay').classList.remove('hidden');
            document.getElementById('saving-overlay').style.display = 'flex';
            const stream = canvas.captureStream(30); 
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'mein-loop.webm';
                a.click();
                document.getElementById('saving-overlay').classList.add('hidden');
                document.getElementById('saving-overlay').style.display = '';
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 3000); 
        }

        function reset() {
            clearInterval(loopInterval);
            video.classList.remove('hidden');
            canvas.classList.add('hidden');
            
            startBtn.classList.remove('hidden'); 
            resultBtns.classList.add('hidden');
            
            speedWrapper.classList.add('opacity-30', 'pointer-events-none');
            switchBtn.classList.remove('hidden');
            
            setSpeed(40); 
            
            videoContainer.classList.remove('border-red-600');
            videoContainer.classList.add('border-gray-800');
            recIndicator.classList.add('hidden');
            recIndicator.style.display = '';
        }
        
        window.addEventListener('beforeunload', () => {
            if(currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });

    </script>
</body>
</html>
