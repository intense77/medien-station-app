<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sound Labor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../assets/logo.png">
    <!-- iOS Meta Tags -->
    <link rel="apple-touch-icon" href="../assets/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="../css/style.css" rel="stylesheet">
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        html {
            width: 100%; height: 100%;
            background-color: #0f172a;
        }

        body {
            /* Fixiertes Layout */
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            margin: 0;
            
            background-color: #0f172a; 
            color: white;
            overflow: hidden !important;
            user-select: none; 
            touch-action: manipulation;
            font-family: sans-serif;
            animation: fadeIn 0.4s ease-out;
            
            box-sizing: border-box;
            
            /* SAFE AREA PADDING */
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        #pad-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0.5rem; /* Etwas enger für mehr Platz */
            width: 100%;
        }

        .pad-item {
            background-color: #1e293b;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-bottom: 6px solid #0f172a;
            position: relative;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.1s;
        }
        .pad-item:active { border-bottom-width: 0; transform: translateY(4px); }
        
        button:active, a:active { transform: scale(0.95); transition: transform 0.1s; }
        .pulse-rec { animation: pulseRed 1s infinite; border-color: #ef4444 !important; box-shadow: 0 0 25px #ef4444; }
        @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .fx-active { border: 4px solid white !important; transform: scale(1.2); box-shadow: 0 0 30px rgba(255,255,255,0.9); z-index: 20; filter: brightness(1.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .font-comic { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4">
      
    <div class="flex-none flex justify-between items-center z-50 mb-2 relative h-16">
        <button onclick="goHome()" class="bg-slate-800 text-white border-4 border-slate-600 hover:border-white px-6 py-2 rounded-full text-xl font-black shadow-xl flex items-center gap-2 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 MENÜ
        </button>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
             <h1 class="text-2xl md:text-4xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] tracking-widest uppercase">
                ✨ MUSIK LABOR
            </h1>
        </div>

        <button onclick="toggleInfo()" class="w-12 h-12 bg-slate-800 text-white rounded-full font-bold border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-xl shrink-0 z-50">
            ?
        </button>
    </div>

    <div class="flex flex-row flex-wrap justify-center items-center gap-4 z-40 mb-2 shrink-0 w-full">
        <!-- Linke Gruppe: Visualizer & Effekte -->
        <div class="flex items-center gap-4 bg-slate-800/50 p-2 rounded-2xl border border-slate-700 shrink-0">
            <div id="visualizer-box" class="relative w-48 h-14 bg-slate-800 rounded-xl border-2 border-slate-600 overflow-hidden shadow-lg transition-colors duration-300 shrink-0">
                <canvas id="visualizer" class="w-full h-full"></canvas>
                <div id="vis-label" class="absolute inset-0 flex items-center justify-center text-slate-500 font-black tracking-widest text-xs pointer-events-none">BEREIT</div>
            </div>
            
            <div class="h-12 w-0.5 bg-slate-600 rounded-full mx-1 hidden md:block"></div>

            <div class="flex gap-2 shrink-0">
                <button onclick="setGlobalFx(0.6, this)" class="fx-btn w-14 h-14 rounded-xl bg-purple-600 text-3xl shadow-lg border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition flex items-center justify-center" title="Monster">🧟</button>
                <button onclick="setGlobalFx(1.0, this)" class="fx-btn w-14 h-14 rounded-xl bg-blue-600 text-3xl shadow-lg border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 transition fx-active ring-4 ring-white flex items-center justify-center" title="Normal">🙂</button>
                <button onclick="setGlobalFx(1.7, this)" class="fx-btn w-14 h-14 rounded-xl bg-yellow-500 text-3xl shadow-lg border-b-4 border-yellow-700 active:border-b-0 active:translate-y-1 transition flex items-center justify-center" title="Maus">🐭</button>
            </div>
        </div>

        <!-- Rechte Gruppe: Steuerung -->
        <div class="flex gap-2 bg-slate-800 p-2 rounded-2xl border-2 border-slate-700 shadow-xl shrink-0">
            <button id="btn-rec" onclick="setMode('rec')" class="flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-black text-base transition-all border-b-4 border-transparent bg-slate-700 hover:bg-slate-600 text-gray-300 active:scale-95 active:border-b-0 active:translate-y-1 min-w-[80px]">
                <div class="w-4 h-4 rounded-full bg-red-500 shadow-sm"></div> REC
            </button>
            <button id="btn-loop" onclick="setMode('loop')" class="flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-black text-base transition-all border-b-4 border-transparent bg-slate-700 hover:bg-slate-600 text-gray-300 active:scale-95 active:border-b-0 active:translate-y-1 min-w-[80px]">
                🔁 LOOP
            </button>
            <button onclick="stopAll()" class="px-4 py-2 rounded-xl font-black text-base bg-slate-700 hover:bg-red-500 hover:text-white transition-all text-gray-300 border-b-4 border-transparent active:scale-95 active:border-b-0 active:translate-y-1 min-w-[80px]">
                ⏹ STOP
            </button>
        </div>
    </div>

    <div id="status-bar" class="text-center text-slate-400 mb-1 font-mono text-sm uppercase tracking-widest font-bold transition-all duration-300 shrink-0">
        Modus: SPIELEN
    </div>

    <div id="pad-container" class="flex-1 min-h-0 w-full max-w-5xl mx-auto z-10 pb-1"></div>

    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm items-center justify-center p-4" onclick="toggleInfo()">
        <div class="bg-slate-800 border-4 border-rose-500 rounded-[2rem] max-w-3xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="toggleInfo(); playSound('click')" class="absolute top-6 right-6 text-white hover:text-rose-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4"><span class="text-6xl">🎹</span> ANLEITUNG</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-base">
                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center"><div class="text-4xl mb-4">🧟</div><h3 class="text-purple-400 font-bold text-xl mb-2">Effekte</h3><p class="text-slate-300 leading-snug">Wähle <b>VOR</b> der Aufnahme oben Monster oder Maus.</p></div>
                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center"><div class="text-4xl mb-4">🎤</div><h3 class="text-rose-400 font-bold text-xl mb-2">Aufnehmen</h3><p class="text-slate-300 leading-snug">1. Tippe <b>REC</b>.<br>2. Wähle Pad.<br>3. Sprich.<br>4. Tippe Pad zum Stop.</p></div>
                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center"><div class="text-4xl mb-4">🔁</div><h3 class="text-blue-400 font-bold text-xl mb-2">Loopen</h3><p class="text-slate-300 leading-snug">Tippe <b>LOOP</b> und wähle Pads für Dauerschleife.</p></div>
            </div>
            <button onclick="toggleInfo()" class="mt-8 w-full bg-rose-600 hover:bg-rose-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/30 backdrop-blur-sm pointer-events-none">
        <div class="text-[10rem] md:text-[15rem] font-black text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] font-comic" id="countdown-text">3</div>
    </div>

    <script>
        // Globaler Fehler-Handler für Debugging auf dem Tablet
        window.onerror = function(msg, url, line) {
            // Nur kritische Fehler anzeigen, die das Laden verhindern könnten
            console.error("Global Error:", msg, line);
        };

        let currentRecRate = 1.0;
        
        // Tablet Hardening: Kontextmenü deaktivieren
        document.addEventListener('contextmenu', event => event.preventDefault());

        function setGlobalFx(rate, btn) { 
            window.playSound('click'); 
            currentRecRate = rate; 
            document.querySelectorAll('.fx-btn').forEach(b => { b.classList.remove('fx-active', 'ring-4', 'ring-white'); }); 
            if(btn) btn.classList.add('fx-active', 'ring-4', 'ring-white'); 
        }
        
        let audioCtx = null;
        let globalAnalyser = null;

        let pads = []; 
        let currentMode = 'play'; 
        let visualizerFrame = null;
        let currentAmp = 0;
        
        function init() { 
            console.log("Init Sound App...");
            // 1. PADS GENERIEREN (Absolut sicherstellen, dass dies läuft)
            const container = document.getElementById('pad-container'); 
            if(!container) { alert("Fehler: Pad-Container fehlt!"); return; }
            container.innerHTML = ''; 
            pads = []; // WICHTIG: Array leeren bei Neustart
            
            for(let i = 0; i < 12; i++) { 
                pads.push({ 
                    buffer: null, 
                    loop: false, 
                    sourceNode: null, 
                    isRecording: false, 
                    mediaObj: null, 
                    playbackRate: 1.0, 
                    startTimeout: null,
                    chunks: []
                }); 
                
                const el = document.createElement('div'); 
                el.id = `pad-${i}`; 
                el.className = `pad-item transition-all duration-100`; 
                el.innerHTML = `
                    <div class="text-4xl md:text-6xl font-black text-slate-700 transition-colors duration-300" id="label-${i}">${i+1}</div>
                    <div id="icon-loop-${i}" class="hidden absolute top-2 right-2 text-xl bg-blue-600 text-white rounded px-1 shadow-md">🔁</div>
                    <div id="icon-fx-${i}" class="absolute bottom-2 right-2 text-xl drop-shadow-md"></div>
                    <div id="icon-rec-${i}" class="hidden absolute top-3 left-3 w-4 h-4 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
                    <div id="status-${i}" class="hidden absolute bottom-2 w-full text-center text-xs font-black uppercase tracking-widest text-emerald-400">BELEGT</div>
                `; 
                el.onpointerdown = (e) => { handlePadTouch(i); }; 
                container.appendChild(el); 
            }

            // 2. AUDIO STARTEN (Danach)
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
                if (audioCtx) {
                    globalAnalyser = audioCtx.createAnalyser();
                    globalAnalyser.fftSize = 256;
                    globalAnalyser.connect(audioCtx.destination);
                }
            } catch(e) { 
                console.warn("Audio Context Warnung (Pads sollten trotzdem da sein):", e); 
            }
            
            startVisualizer(); 
        }
        
        window.setMode = function(mode) { window.playSound('click'); if (currentMode === mode) currentMode = 'play'; else currentMode = mode; updateUI(); }
        function updateUI() { const btnRec = document.getElementById('btn-rec'); const btnLoop = document.getElementById('btn-loop'); const status = document.getElementById('status-bar'); const inactive = "border-transparent bg-slate-700 text-gray-300 hover:bg-slate-600"; const activeRec = "border-red-500 text-red-400 bg-slate-900 shadow-[0_0_10px_rgba(239,68,68,0.2)]"; const activeLoop = "border-blue-500 text-blue-400 bg-slate-900 shadow-[0_0_10px_rgba(59,130,246,0.2)]"; const base = "flex items-center justify-center gap-3 px-6 py-3 rounded-xl font-black text-lg transition-all border-b-4 active:scale-95 active:border-b-0 active:translate-y-1 min-w-[100px] "; btnRec.className = base + (currentMode === 'rec' ? activeRec : inactive); btnLoop.className = base + (currentMode === 'loop' ? activeLoop : inactive); if (currentMode === 'rec') { status.innerText = "🔴 AUFNAHME"; status.className = "text-center mb-1 font-mono text-sm uppercase tracking-widest text-red-400 animate-pulse font-bold"; } else if (currentMode === 'loop') { status.innerText = "🔁 LOOP SETZEN"; status.className = "text-center mb-1 font-mono text-sm uppercase tracking-widest text-blue-400 font-bold"; } else { status.innerText = "Modus: SPIELEN"; status.className = "text-center text-slate-400 mb-1 font-mono text-sm uppercase tracking-widest font-bold"; } }
        
        let recInitLock = false;
        let activeMediaRec = null;

        async function handlePadTouch(i) { 
            if(window.resetIdleTimer) window.resetIdleTimer(); 
            
            // WICHTIG: AudioContext wecken!
            if (audioCtx && audioCtx.state === 'suspended') {
                try { await audioCtx.resume(); } catch(e) { console.warn(e); }
            }

            const pad = pads[i]; 
            const el = document.getElementById(`pad-${i}`); 
            
            // SPEZIALFALL REC: Mikrofon MUSS die allererste Aktion sein (User Gesture)
            if (currentMode === 'rec') {
                
                const pad = pads[i];
                if (pad.isRecording) {
                    stopRecording(i); 
                    return;
                }
                
                if (recInitLock) return; // Verhindert Doppelklicks während Initialisierung
                recInitLock = true;

                // Start Countdown before recording
                const overlay = document.getElementById('countdown-overlay');
                const text = document.getElementById('countdown-text');
                let count = 3;
                overlay.classList.remove('hidden');
                
                const tick = () => {
                    text.innerText = count;
                    text.classList.remove('animate-pop');
                    void text.offsetWidth; 
                    text.classList.add('animate-pop');
                    window.playSound('click'); 
                    
                    if (count === 0) {
                        overlay.classList.add('hidden');
                        startRecording(i);
                        recInitLock = false;
                    } else {
                        count--;
                        setTimeout(tick, 1000);
                    }
                };
                tick();
                return;
            } 

            // NORMALER MODUS (Play/Loop)
            if (currentMode === 'play') { 
                if (!pad.buffer) { 
                    // Falls keine Daten im Buffer, aber ein Pfad existiert -> Nachladen
                    if (pad.src) loadPadSound(i);
                    return;
                }
                
                if (pad.loop) { 
                    // Loop Toggle
                    if (pad.sourceNode) { 
                        try { pad.sourceNode.stop(); } catch(e){} 
                        pad.sourceNode = null;
                        el.classList.remove('bg-blue-600', 'border-blue-800'); el.style.backgroundColor = "#1e293b"; 
                    } 
                    else { playMusicPad(i, true); el.style.backgroundColor = "#2563eb"; } 
                } else { 
                    // One Shot
                    playMusicPad(i, false); el.style.backgroundColor = "#10b981"; setTimeout(() => el.style.backgroundColor = "#1e293b", 150); 
                } 
            } else if (currentMode === 'loop') { 
                window.playSound('click'); if (!pad.buffer) return; pad.loop = !pad.loop; document.getElementById(`icon-loop-${i}`).classList.toggle('hidden', !pad.loop); el.style.transform = "scale(0.95)"; setTimeout(() => el.style.transform = "scale(1)", 100); 
            }
        }
        
        function playMusicPad(i, loop) { 
            if(!audioCtx) return; 
            const pad = pads[i]; 
            if (pad.sourceNode) { try { pad.sourceNode.stop(); } catch(e){} pad.sourceNode = null; } 
            
            const source = audioCtx.createBufferSource(); 
            source.buffer = pad.buffer; 
            source.loop = loop; 
            source.playbackRate.value = pad.playbackRate; 
            
            // Verbinden mit globalem Analyser für Visualizer
            source.connect(globalAnalyser);
            
            // Cleanup wenn fertig (wichtig für One-Shot -> Loop Wechsel)
            source.onended = function() {
                if (pad.sourceNode === source) {
                    pad.sourceNode = null;
                }
            };
            
            source.start(0); 
            pad.sourceNode = source; // Immer speichern, damit wir stoppen können
            
            startVisualizer();
        }
        
        function startVisualizer() { 
            const canvas = document.getElementById('visualizer'); 
            const ctx = canvas.getContext('2d'); 
            
            // WICHTIG: Canvas Größe explizit setzen, sonst verzerrt/unsichtbar
            canvas.width = canvas.offsetWidth || 160; // Fallback falls Layout noch 0
            canvas.height = canvas.offsetHeight || 64;
            
            if (visualizerFrame) cancelAnimationFrame(visualizerFrame);
            
            function draw() { 
                visualizerFrame = requestAnimationFrame(draw); 
                ctx.fillStyle = '#1e293b'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 
                
                if (activeMediaRec) {
                    // Aufnahme: Roter Balken (Amplitude)
                    activeMediaRec.getCurrentAmplitude(
                        function(amp) {
                            let val = amp;
                            if (val > 1) val = val / 32767;
                            if (val > 1) val = 1;
                            currentAmp = val;
                        },
                        function(e) {}
                    );
                    const wBar = Math.max(10, canvas.width * currentAmp * 0.9); 
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect((canvas.width - wBar) / 2, 0, wBar, canvas.height);
                } else if (globalAnalyser) {
                    // Nulllinie (damit man sieht, dass er an ist)
                    ctx.fillStyle = '#334155';
                    ctx.fillRect(0, canvas.height / 2, canvas.width, 2);

                    // Wiedergabe: Grünes Spektrum
                    const dataArray = new Uint8Array(globalAnalyser.frequencyBinCount);
                    globalAnalyser.getByteFrequencyData(dataArray);
                    const barWidth = (canvas.width / dataArray.length) * 2.5;
                    let x = 0;
                    for(let i = 0; i < dataArray.length; i++) {
                        const barHeight = dataArray[i] / 255 * canvas.height;
                        ctx.fillStyle = '#22c55e';
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                }
            } 
            draw(); 
        }
        
        function stopVisualizer() { /* Läuft weiter */ }
        
        async function startRecording(i) { 
            window.playSound('shutter'); 
            const pad = pads[i]; 
            const el = document.getElementById(`pad-${i}`); 
            const visBox = document.getElementById('visualizer-box');
            const visLabel = document.getElementById('vis-label');
            
            currentAmp = 0;
            
            pad.isRecording = true; 
            document.getElementById(`icon-rec-${i}`).classList.remove('hidden'); 
            el.classList.add('pulse-rec', 'rec-active'); 

            // Verzögerter Start (1000ms) gegen Shutter-Sound
            pad.startTimeout = setTimeout(async () => {
                pad.startTimeout = null;
                try { 
                    if (window.cordova && typeof Media !== 'undefined') {
                        // NATIVE
                        if (pad.mediaObj) { pad.mediaObj.release(); }
                        const fileName = `sound_pad_${i}.aac`;
                        let path = fileName;
                        if (cordova.file && cordova.file.dataDirectory) path = cordova.file.dataDirectory + fileName;
                        pad.src = path;
                        pad.mediaObj = new Media(path, () => console.log("Rec Success"), (e) => console.error("Rec Error", e));
                        pad.mediaObj.startRecord();
                        activeMediaRec = pad.mediaObj;
                    } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia && audioCtx) {
                        // WEB
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        pad.stream = stream;
                        pad.mediaRecorder = new MediaRecorder(stream);
                        pad.chunks = [];
                        pad.mediaRecorder.ondataavailable = e => pad.chunks.push(e.data);
                        pad.mediaRecorder.start();
                        
                        // Fake activeMediaRec für Visualizer
                        const analyser = audioCtx.createAnalyser();
                        const source = audioCtx.createMediaStreamSource(stream);
                        source.connect(analyser);
                        activeMediaRec = {
                            getCurrentAmplitude: (cb) => {
                                const data = new Uint8Array(analyser.frequencyBinCount);
                                analyser.getByteTimeDomainData(data);
                                let sum = 0; for(let i=0; i<data.length; i++) { const v = (data[i]-128)/128; sum += v*v; }
                                cb(Math.sqrt(sum) * 30000);
                            }
                        };
                    } else {
                        alert("Aufnahme nicht möglich (Kein Mikrofon/Cordova).");
                        stopRecording(i);
                    }
                    
                    // UI Feedback
                    visBox.classList.replace('border-slate-600', 'border-red-500');
                    visLabel.innerText = "● AUFNAHME";
                    visLabel.classList.add('text-red-500', 'animate-pulse');
                    visLabel.classList.remove('text-slate-500');
                } catch (err) { alert("Plugin Fehler: " + err.message); } 
            }, 1000);
        }
        
        function stopRecording(i) { 
            window.playSound('success'); 
            const pad = pads[i]; 
            const el = document.getElementById(`pad-${i}`); 
            const visBox = document.getElementById('visualizer-box');
            const visLabel = document.getElementById('vis-label');
            
            // Abbruch, falls während Delay gestoppt
            if (pad.startTimeout) {
                clearTimeout(pad.startTimeout);
                pad.startTimeout = null;
                pad.isRecording = false;
                document.getElementById(`icon-rec-${i}`).classList.add('hidden'); 
                el.classList.remove('pulse-rec', 'rec-active'); 
                window.setMode('play');
                return;
            }

            if (window.cordova && pad.mediaObj) {
                // Native Stop
                try { pad.mediaObj.stopRecord(); pad.mediaObj.release(); pad.mediaObj = null; } catch(e){}
            } else if (pad.mediaRecorder) {
                // Web Stop
                pad.mediaRecorder.onstop = () => {
                    const blob = new Blob(pad.chunks, { type: 'audio/webm;codecs=opus' });
                    // Direkt laden
                    const reader = new FileReader();
                    reader.onloadend = () => audioCtx.decodeAudioData(reader.result, (b) => { pad.buffer = b; updatePadVisuals(i, true); });
                    reader.readAsArrayBuffer(blob);
                    if(pad.stream) pad.stream.getTracks().forEach(t => t.stop());
                };
                pad.mediaRecorder.stop();
            }
            activeMediaRec = null;
            
            pad.isRecording = false; 
            
            document.getElementById(`icon-rec-${i}`).classList.add('hidden'); 
            el.classList.remove('pulse-rec', 'rec-active'); 
            
            // UI Reset
            visBox.classList.replace('border-red-500', 'border-slate-600');
            visLabel.innerText = "LADE...";
            visLabel.classList.remove('text-red-500', 'animate-pulse');
            visLabel.classList.add('text-yellow-500');
            
            // Pad Status Update
            document.getElementById(`status-${i}`).innerText = "LADE...";
            document.getElementById(`status-${i}`).classList.remove('hidden');

            // Nur bei Native müssen wir warten und laden
            if (window.cordova) {
                setTimeout(() => { loadPadSound(i); }, 800);
            } else {
                // Web lädt im onstop Handler
                window.setMode('play');
                visLabel.innerText = "BEREIT";
                visLabel.classList.replace('text-yellow-500', 'text-slate-500');
            }
        }

        function loadPadSound(i) {
            const pad = pads[i];
            const visLabel = document.getElementById('vis-label');

            if (window.resolveLocalFileSystemURL && pad.src) {
                window.resolveLocalFileSystemURL(pad.src, function(entry) {
                    entry.file(function(file) {
                        const reader = new FileReader();
                        reader.onloadend = function() {
                            audioCtx.decodeAudioData(this.result, function(buffer) {
                                pad.buffer = buffer;
                                pad.playbackRate = currentRecRate;
                                updatePadVisuals(i, true);
                                window.setMode('play');
                                visLabel.innerText = "BEREIT";
                                visLabel.classList.replace('text-yellow-500', 'text-slate-500');
                                document.getElementById(`status-${i}`).innerText = "BEREIT";
                            }, function(e) { 
                                console.error("Decode Fehler", e); 
                                alert("Audio Fehler: Datei konnte nicht verarbeitet werden."); 
                                document.getElementById(`status-${i}`).innerText = "FEHLER";
                            });
                        };
                        reader.readAsArrayBuffer(file);
                    }, function(e) { console.error("Read Fehler", e); alert("Lesefehler: " + e.code); });
                }, function(e) { console.warn("File Not Found", e); alert("Datei nicht gefunden."); });
            } else {
                window.setMode('play');
            }
        }
        
        function updatePadVisuals(i, hasSound) { const el = document.getElementById(`pad-${i}`); const label = document.getElementById(`label-${i}`); const status = document.getElementById(`status-${i}`); const iconFx = document.getElementById(`icon-fx-${i}`); const pad = pads[i]; if (hasSound) { el.style.borderColor = "#10b981"; label.classList.remove('text-slate-700'); label.classList.add('text-white'); status.classList.remove('hidden'); status.innerText = "BELEGT"; if(pad.playbackRate < 0.9) iconFx.innerText = "🧟"; else if(pad.playbackRate > 1.2) iconFx.innerText = "🐭"; else iconFx.innerText = ""; } }
        
        window.stopAll = function() { 
            window.playSound('click'); 
            if(pads && pads.length > 0) { 
                pads.forEach((pad, i) => { 
                    if (pad.sourceNode) { 
                        try { pad.sourceNode.stop(); } catch(e){} 
                        pad.sourceNode = null;
                    } 
                    const el = document.getElementById(`pad-${i}`); 
                    if(el) { el.style.backgroundColor = "#1e293b"; el.classList.remove('bg-blue-600'); } 
                }); 
            } 
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    </script>
</body>
</html>
