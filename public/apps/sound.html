<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sound Labor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>

    <style>
        body { background-color: #0f172a; color: white; user-select: none; touch-action: manipulation; }
        .pad-item { background-color: #1e293b; border-radius: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-bottom: 6px solid #0f172a; position: relative; transition: all 0.1s; }
        .pad-item:active { border-bottom-width: 0; transform: translateY(4px); }
        .pulse-rec { animation: pulseRed 1s infinite; border-color: #ef4444 !important; box-shadow: 0 0 25px #ef4444; }
        @keyframes pulseRed { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .fx-active { ring: 4px solid white; transform: scale(1.1); filter: brightness(1.2); }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 min-h-screen">
      
    <div class="flex justify-between items-center h-16 mb-2">
        <button onclick="window.goHome()" class="bg-slate-800 border-4 border-slate-600 px-6 py-2 rounded-full font-black z-50">🏠 MENÜ</button>
        <h1 class="text-xl md:text-3xl font-black tracking-widest uppercase">✨ MUSIK LABOR</h1>
        <button onclick="window.toggleInfo()" class="w-12 h-12 bg-slate-800 rounded-full font-bold border-4 border-slate-600 z-50">?</button>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-4">
        <div class="flex items-center gap-3 bg-slate-800/50 p-2 rounded-2xl border border-slate-700">
            <div id="visualizer-box" class="w-40 h-12 bg-slate-900 rounded-xl border-2 border-slate-600 overflow-hidden relative">
                <canvas id="visualizer" class="w-full h-full"></canvas>
            </div>
            <div class="flex gap-2">
                <button onclick="setGlobalFx(0.6, this)" class="fx-btn w-12 h-12 rounded-xl bg-purple-600 text-2xl">🧟</button>
                <button onclick="setGlobalFx(1.0, this)" class="fx-btn w-12 h-12 rounded-xl bg-blue-600 text-2xl fx-active">🙂</button>
                <button onclick="setGlobalFx(1.7, this)" class="fx-btn w-12 h-12 rounded-xl bg-yellow-500 text-2xl">🐭</button>
            </div>
        </div>

        <div class="flex gap-2 bg-slate-800 p-2 rounded-2xl border-2 border-slate-700 shadow-xl">
            <button id="btn-rec" onclick="setMode('rec')" class="px-4 py-2 rounded-xl font-black bg-slate-700 text-gray-300 border-b-4 border-transparent">🔴 REC</button>
            <button id="btn-loop" onclick="setMode('loop')" class="px-4 py-2 rounded-xl font-black bg-slate-700 text-gray-300 border-b-4 border-transparent">🔁 LOOP</button>
            <button onclick="stopAll()" class="px-4 py-2 rounded-xl font-black bg-slate-700 hover:bg-red-600">⏹ STOP</button>
        </div>
    </div>

    <div id="status-bar" class="text-center text-slate-400 font-mono text-sm uppercase mb-2">Modus: SPIELEN</div>

    <div id="pad-container" class="grid grid-cols-4 grid-rows-3 gap-2 flex-1 w-full max-w-5xl mx-auto pb-4"></div>

    <div id="countdown-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm pointer-events-none">
        <div class="text-[12rem] font-black text-white" id="countdown-text">3</div>
    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-emerald-500 rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo()" class="absolute top-6 right-6 text-white hover:text-emerald-400 text-4xl font-bold transition">✖</button>
            <h2 class="text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4">
                <span class="text-6xl">🎹</span> ANLEITUNG
                <button onclick="window.speakText('Anleitung für das Musik Labor. Wähle zuerst den Modus. Aufnehmen: Tippe auf einen roten REC Button, dann auf ein Pad. Schleife: Tippe auf LOOP, dann auf ein Pad, damit es sich wiederholt. Spielen: Tippe einfach auf die Pads, um Musik zu machen.', event)" class="ml-auto mr-12 md:mr-16 bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 md:w-14 md:h-14 flex items-center justify-center shadow-lg border-2 border-slate-500 active:scale-95 transition-all text-xl md:text-3xl shrink-0" title="Vorlesen">🔊</button>
            </h2>
            <div class="text-lg text-slate-300 space-y-4">
                <p>1. <b>🔴 REC</b>: Nimm einen Ton auf ein freies Pad auf.</p>
                <p>2. <b>🔁 LOOP</b>: Lass ein Pad sich immer wiederholen.</p>
                <p>3. <b>⏹ STOP</b>: Beendet alle Töne sofort.</p>
                <p>Nutze die Monster- und Maus-Filter links für lustige Stimmen!</p>
            </div>
            <button onclick="window.toggleInfo()" class="mt-8 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl text-xl transition">ALLES KLAR!</button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let pads = [];
        let currentMode = 'play';
        let currentRecRate = 1.0;
        let globalAnalyser = null;

        // Sicherstellen, dass AudioContext nach User-Geste startet
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                globalAnalyser = audioCtx.createAnalyser();
                globalAnalyser.fftSize = 128;
                
                // Dummy-Gain (stumm), damit der Browser den Analyser nicht "wegoptimiert"
                const silentGain = audioCtx.createGain();
                silentGain.gain.value = 0;
                globalAnalyser.connect(silentGain);
                silentGain.connect(audioCtx.destination);
                
                startVisualizer();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function init() {
            const container = document.getElementById('pad-container');
            container.innerHTML = '';
            for(let i = 0; i < 12; i++) {
                pads.push({ buffer: null, loop: false, sourceNode: null, isRecording: false, isCountingDown: false, chunks: [], stream: null, micSource: null });
                const el = document.createElement('div');
                el.id = `pad-${i}`;
                el.className = `pad-item`;
                el.innerHTML = `
                    <div class="text-4xl font-black text-slate-700" id="label-${i}">${i+1}</div>
                    <div id="icon-loop-${i}" class="hidden absolute top-2 right-2 text-sm bg-blue-600 rounded px-1">🔁</div>
                    <div id="icon-rec-${i}" class="hidden absolute top-2 left-2 w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                    <div id="status-${i}" class="hidden absolute bottom-1 text-[8px] font-bold text-emerald-400">BEREIT</div>
                `;
                // Wichtig: Pointer-Events für Tablets
                el.onpointerdown = (e) => { e.preventDefault(); handlePadTouch(i); };
                container.appendChild(el);
            }
        }

        function setMode(mode) {
            if(window.playSound) window.playSound('click');
            initAudio(); // Aktivierung bei Klick
            if (currentMode === mode) currentMode = 'play';
            else currentMode = mode;
            updateUI();
        }

        function updateUI() {
            const btnRec = document.getElementById('btn-rec');
            const btnLoop = document.getElementById('btn-loop');
            const status = document.getElementById('status-bar');
            
            btnRec.classList.toggle('border-red-500', currentMode === 'rec');
            btnRec.classList.toggle('text-red-400', currentMode === 'rec');
            btnLoop.classList.toggle('border-blue-500', currentMode === 'loop');
            btnLoop.classList.toggle('text-blue-400', currentMode === 'loop');
            
            status.innerText = currentMode === 'rec' ? "🔴 AUFNAHME MODUS" : (currentMode === 'loop' ? "🔁 LOOP MODUS" : "Modus: SPIELEN");
        }

        async function handlePadTouch(i) {
            initAudio();
            const pad = pads[i];
            const el = document.getElementById(`pad-${i}`);

            if (currentMode === 'rec') {
                if (pad.isRecording) { stopRecording(i); } 
                else if (pad.isCountingDown) { return; } // Schutz vor Kinder-Doppelklicks!
                else { startCountdown(i); }
            } else if (currentMode === 'loop') {
                if (!pad.buffer) return;
                pad.loop = !pad.loop;
                document.getElementById(`icon-loop-${i}`).classList.toggle('hidden', !pad.loop);
            } else {
                if (!pad.buffer) return;
                playPad(i);
            }
        }

        function startCountdown(i) {
            const pad = pads[i];
            pad.isCountingDown = true;
            const overlay = document.getElementById('countdown-overlay');
            const text = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            let count = 3;
            
            if(window.playSound) window.playSound('click');
            const timer = setInterval(() => {
                text.innerText = count;
                if (count <= 0) {
                    clearInterval(timer);
                    overlay.classList.add('hidden');
                    pad.isCountingDown = false;
                    if(window.playSound) window.playSound('shutter');
                    startRecording(i);
                } else { if(window.playSound) window.playSound('click'); }
                count--;
            }, 800);
        }

        async function startRecording(i) {
            const pad = pads[i];
            const el = document.getElementById(`pad-${i}`);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                pad.stream = stream;
                pad.isRecording = true;
                pad.chunks = [];

                // Mikrofon an den Visualizer anschließen (ohne Lautsprecher-Ausgabe!)
                pad.micSource = audioCtx.createMediaStreamSource(stream);
                pad.micSource.connect(globalAnalyser);

                // MIME-Type Auswahl für Firefox/Chrome/Android
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                const recorder = new MediaRecorder(stream, { mimeType });
                
                recorder.ondataavailable = (e) => { if (e.data.size > 0) pad.chunks.push(e.data); };
                recorder.onstop = async () => {
                    const blob = new Blob(pad.chunks, { type: mimeType });
                    const arrayBuffer = await blob.arrayBuffer();
                    audioCtx.decodeAudioData(arrayBuffer, (decoded) => {
                        pad.buffer = decoded;
                        pad.playbackRate = currentRecRate;
                        document.getElementById(`status-${i}`).classList.remove('hidden');
                        el.style.borderColor = "#10b981";
                    });
                    if (pad.micSource) {
                        pad.micSource.disconnect();
                        pad.micSource = null;
                    }
                    stream.getTracks().forEach(t => t.stop());
                };

                pad.recorder = recorder;
                recorder.start();
                
                el.classList.add('pulse-rec');
                document.getElementById(`icon-rec-${i}`).classList.remove('hidden');
            } catch (err) {
                alert("Mikrofon Zugriff verweigert oder nicht gefunden.");
            }
        }

        function stopRecording(i) {
            const pad = pads[i];
            if (pad.recorder && pad.isRecording) {
                pad.recorder.stop();
                pad.isRecording = false;
                document.getElementById(`icon-rec-${i}`).classList.add('hidden');
                document.getElementById(`pad-${i}`).classList.remove('pulse-rec');
                setMode('play');
            }
        }

        function playPad(i) {
            const pad = pads[i];
            if (pad.sourceNode) { try { pad.sourceNode.stop(); } catch(e){} }
            
            const source = audioCtx.createBufferSource();
            source.buffer = pad.buffer;
            source.playbackRate.value = pad.playbackRate || 1.0;
            source.loop = pad.loop;
            source.connect(audioCtx.destination); // Ton an Lautsprecher senden
            source.connect(globalAnalyser);
            source.start(0);
            pad.sourceNode = source;
            
            const el = document.getElementById(`pad-${i}`);
            el.style.backgroundColor = "#10b981";
            setTimeout(() => el.style.backgroundColor = "#1e293b", 150);
        }

        function stopAll() {
            if(window.playSound) window.playSound('click');
            pads.forEach((p, i) => {
                if (p.sourceNode) p.sourceNode.stop();
                document.getElementById(`pad-${i}`).style.backgroundColor = "#1e293b";
            });
        }

        function setGlobalFx(rate, btn) {
            if(window.playSound) window.playSound('click');
            currentRecRate = rate;
            document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('fx-active'));
            btn.classList.add('fx-active');
        }

        function startVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            function draw() {
                requestAnimationFrame(draw);
                const data = new Uint8Array(globalAnalyser.frequencyBinCount);
                globalAnalyser.getByteFrequencyData(data);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#22c55e';
                for (let i = 0; i < data.length; i++) {
                    const h = (data[i] / 255) * canvas.height;
                    ctx.fillRect(i * 3, canvas.height - h, 2, h);
                }
            }
            draw();
        }

        window.onload = init;
    </script>
</body>
</html>
