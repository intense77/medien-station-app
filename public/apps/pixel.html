<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pixel Labor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="../js/tailwind.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../cordova.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/print.js"></script>

    <style>
        /* FIX: w-full statt w-screen verhindert horizontalen Scrollbalken */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            background-color: #0f172a; color: white; 
            overflow: hidden; user-select: none; touch-action: manipulation; 
        }
        
        /* Das Gitter */
        .pixel-grid { 
            display: grid; 
            grid-template-columns: repeat(16, 1fr); 
            grid-template-rows: repeat(16, 1fr); 
            gap: 1px; 
            background: #334155; 
            border: 8px solid #10b981; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
            border-radius: 1rem;
            overflow: hidden;
            touch-action: none;
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
        }
        
        .cell { background-color: white; cursor: pointer; transition: background-color 0.05s; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container {
                position: fixed; left: 0; top: 0; width: 100%; height: 100%;
                display: flex !important; align-items: center; justify-content: center;
                background: white; z-index: 99999;
            }
            #print-img {
                max-width: 90%; max-height: 90%; object-fit: contain;
                border: 4px solid black;
                image-rendering: pixelated;
            }
        }
    </style>
</head>
<body class="flex flex-col p-2 md:p-4 box-border bg-slate-900 overflow-hidden h-[100dvh] w-full">

    <!-- HEADER ZEILE (Menü, Titel, Hilfe) -->
    <div class="h-16 md:h-20 flex-none flex justify-between items-center z-50 mb-2 px-1">
        <button onclick="window.goHome()" class="bg-slate-800 text-white border-2 md:border-4 border-slate-600 hover:border-white px-3 py-2 md:px-6 md:py-3 rounded-full text-xs md:text-xl font-black shadow-xl flex items-center gap-1 md:gap-3 transition-transform active:scale-95 no-underline focus:outline-none shrink-0 z-50">
            🏠 <span class="hidden md:inline">MENÜ</span>
        </button>

        <h1 class="text-2xl md:text-5xl font-black text-emerald-400 font-mono tracking-wider drop-shadow-lg hidden md:block">&lt;PIXEL /&gt;</h1>
        
        <button onclick="window.toggleInfo()" class="w-10 h-10 md:w-14 md:h-14 bg-slate-800 text-white rounded-full font-bold border-2 md:border-4 border-slate-600 hover:border-white shadow-xl flex items-center justify-center transition-transform active:scale-95 text-lg md:text-2xl shrink-0 z-50">
            ?
        </button>
    </div>

    <!-- HAUPT-BEREICH -->
    <div class="flex-1 flex flex-col md:flex-row landscape:flex-row items-center justify-center gap-2 md:gap-4 min-h-0 min-w-0 w-full max-w-[95rem] mx-auto pb-1">
        
        <!-- Das Gitter (Container) -->
        <div class="relative flex-1 w-full max-w-full md:max-w-[650px] landscape:max-w-[650px] flex items-center justify-center p-1 md:p-2 min-h-0 min-w-0">
            <div id="grid" class="pixel-grid w-full h-auto max-h-full aspect-square">
                <!-- Zellen per JS -->
            </div>
        </div>

        <!-- Werkzeugleiste -->
        <div class="bg-slate-800 p-2 md:p-6 landscape:p-2 md:landscape:p-6 rounded-xl md:rounded-[2rem] border-2 md:border-4 border-slate-700 flex flex-col gap-2 md:gap-4 shadow-2xl w-full landscape:w-24 md:landscape:w-auto md:w-auto md:min-w-[220px] h-auto landscape:h-full md:h-full justify-start md:justify-between shrink-0 overflow-y-auto no-scrollbar">
            
            <!-- Farben (Horizontal Scroll auf Mobile, 2-Spaltig auf Desktop) -->
            <div class="flex flex-row md:grid md:grid-cols-2 landscape:grid landscape:grid-cols-2 gap-2 md:gap-3 flex-shrink-0 justify-start md:justify-items-center overflow-x-auto no-scrollbar pb-1 md:pb-0 w-full" id="palette">
                <!-- Schwarz/Weiß -->
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-black border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition ring-4 ring-white shadow-lg" data-color="#000000" onclick="setColor(this)"></div>
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-white border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#ffffff" onclick="setColor(this)"></div>
                
                <!-- Bunt -->
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-red-500 border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#ef4444" onclick="setColor(this)"></div>
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-blue-500 border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#3b82f6" onclick="setColor(this)"></div>
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-green-500 border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#22c55e" onclick="setColor(this)"></div>
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-yellow-400 border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#facc15" onclick="setColor(this)"></div>
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-purple-500 border-2 md:border-4 border-slate-600 cursor-pointer active:scale-90 transition shadow-lg" data-color="#a855f7" onclick="setColor(this)"></div>
                
                <!-- Radierer -->
                <div class="color-btn shrink-0 w-10 h-10 md:w-16 md:h-16 landscape:w-10 landscape:h-10 md:landscape:w-16 md:landscape:h-16 rounded-lg md:rounded-2xl bg-slate-600 border-2 md:border-4 border-slate-500 cursor-pointer active:scale-90 transition flex items-center justify-center text-lg md:text-3xl landscape:text-xl md:landscape:text-3xl shadow-lg" data-color="white" onclick="setColor(this)" title="Radierer">🧽</div>
            </div>

            <!-- Trenner -->
            <div class="h-1 w-full bg-slate-700 my-1 hidden md:block rounded-full shrink-0"></div>

            <!-- Aktionen -->
            <div class="flex flex-row md:flex-col landscape:flex-col gap-2 md:gap-3 w-full shrink-0 justify-between md:justify-center">
                <button onclick="downloadArt()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-2 md:py-4 landscape:py-2 md:landscape:py-4 px-2 rounded-lg md:rounded-2xl font-black text-[10px] md:text-lg landscape:text-[10px] md:landscape:text-lg shadow-lg active:translate-y-1 transition border-b-4 md:border-b-8 border-emerald-800 active:border-b-0 flex items-center justify-center gap-1 md:gap-2">
                    <span class="text-sm md:text-xl landscape:text-sm md:landscape:text-xl">💾</span> <span class="inline landscape:hidden md:landscape:inline">SAVE</span>
                </button>
                <button onclick="printArt(this)" class="flex-1 bg-white text-emerald-900 hover:bg-gray-200 py-2 md:py-4 landscape:py-2 md:landscape:py-4 px-2 rounded-lg md:rounded-2xl font-black text-[10px] md:text-lg landscape:text-[10px] md:landscape:text-lg shadow-lg active:translate-y-1 transition border-b-4 md:border-b-8 border-gray-300 active:border-b-0 flex items-center justify-center gap-1 md:gap-2">
                    <span class="text-sm md:text-xl landscape:text-sm md:landscape:text-xl">🖨️</span> <span class="inline landscape:hidden md:landscape:inline">DRUCK</span>
                </button>
                <button onclick="clearGrid()" class="flex-1 bg-slate-700 hover:bg-red-500/80 text-white py-2 md:py-4 landscape:py-2 md:landscape:py-4 px-2 rounded-lg md:rounded-2xl font-black text-[10px] md:text-lg landscape:text-[10px] md:landscape:text-lg shadow-lg active:translate-y-1 transition border-b-4 md:border-b-8 border-slate-900 active:border-b-0 flex items-center justify-center gap-1 md:gap-2">
                    <span class="text-sm md:text-xl landscape:text-sm md:landscape:text-xl">🗑️</span> <span class="hidden sm:inline landscape:hidden md:landscape:inline">LÖSCHEN</span><span class="inline sm:hidden landscape:inline md:landscape:hidden">DEL</span>
                </button>
            </div>
        </div>
    </div>

    <!-- HILFE MODAL -->
    <div id="info-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onclick="window.toggleInfo()">
        <div class="bg-slate-800 border-4 border-emerald-500 rounded-[2rem] max-w-3xl w-full p-8 shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="window.toggleInfo()" class="absolute top-6 right-6 text-white hover:text-emerald-400 text-4xl font-bold transition">✖</button>
            
            <h2 class="text-4xl font-black text-white mb-8 border-b border-slate-600 pb-4 flex items-center gap-4">
                <span class="text-6xl">👾</span> ANLEITUNG
                <button onclick="window.speakText('Anleitung für das Pixel Labor. Malen: Wähle rechts eine Farbe und tippe oder ziehe über die Quadrate. Radieren: Wähle den Schwamm oder drücke auf LÖSCHEN, um von vorne zu beginnen. Fertig? Speichere dein Pixel-Kunstwerk oder drucke es direkt aus.', event)" class="ml-auto mr-12 md:mr-16 bg-slate-700 hover:bg-slate-600 text-white rounded-full w-10 h-10 md:w-14 md:h-14 flex items-center justify-center shadow-lg border-2 border-slate-500 active:scale-95 transition-all text-xl md:text-3xl shrink-0" title="Vorlesen">🔊</button>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-base">
                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center">
                    <div class="text-4xl mb-4">🎨</div>
                    <h3 class="text-emerald-400 font-bold text-xl mb-2">Malen</h3>
                    <p class="text-slate-300 leading-snug">Wähle rechts eine <b>Farbe</b> und tippe oder ziehe über die Quadrate.</p>
                </div>
                
                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center">
                    <div class="text-4xl mb-4">🧽</div>
                    <h3 class="text-white font-bold text-xl mb-2">Radieren</h3>
                    <p class="text-slate-300 leading-snug">Wähle den <b>Schwamm</b> oder drücke auf "LÖSCHEN", um von vorne zu beginnen.</p>
                </div>

                <div class="p-6 bg-slate-700/50 rounded-2xl border border-slate-600 flex flex-col items-center text-center">
                    <div class="text-4xl mb-4">💾</div>
                    <h3 class="text-white font-bold text-xl mb-2">Fertig?</h3>
                    <p class="text-slate-300 leading-snug">Speichere dein Pixel-Kunstwerk oder drucke es direkt aus.</p>
                </div>
            </div>
            
            <button onclick="toggleInfo()" class="mt-8 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl text-xl transition">
                ALLES KLAR!
            </button>
        </div>
    </div>

    <!-- Versteckter Container für den Druck -->
    <div id="print-container" class="hidden">
        <img id="print-img" src="" alt="Druckvorschau">
    </div>

    <script>
        const grid = document.getElementById('grid');
        let currentColor = '#000000';
        let isDrawing = false;

        // Grid bauen (16x16 = 256)
        function initGrid() {
            grid.innerHTML = ''; 
            for(let i=0; i<256; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                cell.addEventListener('mousedown', () => { isDrawing = true; cell.style.backgroundColor = currentColor; });
                cell.addEventListener('mouseenter', () => { if(isDrawing) cell.style.backgroundColor = currentColor; });
                cell.addEventListener('touchstart', (e) => { isDrawing = true; cell.style.backgroundColor = currentColor; }, {passive: false});

                grid.appendChild(cell);
            }
        }

        // Globaler Touch Move Handler
        grid.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if(!isDrawing) return;
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if(target && target.classList.contains('cell')) { target.style.backgroundColor = currentColor; }
        }, {passive: false});

        document.body.addEventListener('mouseup', () => isDrawing = false);
        document.body.addEventListener('touchend', () => isDrawing = false);

        function setColor(btn) {
            if(window.playSound) window.playSound('click');
            currentColor = btn.getAttribute('data-color');
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('ring-4', 'ring-white'));
            btn.classList.add('ring-4', 'ring-white');
        }

        function clearGrid() {
            if(window.playSound) window.playSound('click');
            if(confirm("Wirklich alles löschen?")) {
                document.querySelectorAll('.cell').forEach(c => c.style.backgroundColor = 'white');
            }
        }

        function generateCanvas() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 32; 
            canvas.width = 16 * size;
            canvas.height = 16 * size;
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                const x = (i % 16) * size;
                const y = Math.floor(i / 16) * size;
                const color = cell.style.backgroundColor || 'white';
                ctx.fillStyle = color;
                ctx.fillRect(x, y, size, size);
            });
            return canvas;
        }

        function downloadArt() {
            if(window.playSound) window.playSound('success');
            const canvas = generateCanvas();
            const link = document.createElement('a');
            link.download = 'mein-pixel-art.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function printArt(btn) {
            if(window.playSound) window.playSound('click');
            const canvas = generateCanvas();
            const dataUrl = canvas.toDataURL();
            if (window.printImage) {
                window.printImage(dataUrl, 'Pixel', btn);
            } else {
                const printImg = document.getElementById('print-img');
                printImg.src = dataUrl;
                setTimeout(() => { window.print(); }, 100);
            }
        }

        window.onload = initGrid;
    </script>
</body>
</html>
